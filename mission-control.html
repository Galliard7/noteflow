function pad2(n) { return String(n).padStart(2, '0'); }
function dayKeyFromDate(d) { return `${d.getFullYear()}-${pad2(d.getMonth() + 1)}-${pad2(d.getDate())}`; }
function dayKeyFromMs(ms) { return dayKeyFromDate(new Date(ms)); }
function dateFromDayKey(key) {
  const [y, m, d] = key.split('-').map(Number);
  return new Date(y, (m || 1) - 1, d || 1);
}
function formatMsDateTime(ms) {
  if (!ms && ms !== 0) return '—';
  const d = new Date(ms);
  if (Number.isNaN(d.getTime())) return '—';
  return d.toLocaleString('en-US', {
    month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit'
  });
}
function formatRunStatus(status) {
  const s = String(status || 'unknown').toLowerCase();
  if (s === 'ok') return '<span class="calendar-run-status" style="color:#10b981">ok</span>';
  if (s === 'error' || s === 'failed') return '<span class="calendar-run-status" style="color:#ef4444">error</span>';
  return `<span class="calendar-run-status" style="color:#94a3b8">${escapeHtml(s)}</span>`;
}
function updateCalendarModeButtons() {
  const tasksBtn = document.getElementById('calendarModeTasks');
  const jobsBtn = document.getElementById('calendarModeJobs');
  if (!tasksBtn || !jobsBtn) return;
  tasksBtn.classList.toggle('active', calendarMode === 'tasks');
  jobsBtn.classList.toggle('active', calendarMode === 'jobs');
}
function setCalendarMode(mode) {
  calendarMode = mode === 'tasks' ? 'tasks' : 'jobs';
  localStorage.setItem('mc-calendar-mode', calendarMode);
  updateCalendarModeButtons();
  renderCronCalendar();
  renderCronDayPanel();
}
function isWildcardField(field) {
  return field === '*' || field === '?';
}
function parseCronField(field, min, max) {
  const out = new Set();
  const src = String(field || '*').trim();
  if (isWildcardField(src)) {
    for (let i = min; i <= max; i++) out.add(i);
    return out;
  }
  for (const partRaw of src.split(',')) {
    const part = partRaw.trim();
    if (!part) continue;
    const [baseRaw, stepRaw] = part.split('/');
    const step = Number(stepRaw) > 0 ? Number(stepRaw) : 1;
    const base = (baseRaw || '*').trim();

    let rangeStart = min;
    let rangeEnd = max;
    if (!isWildcardField(base)) {
      if (base.includes('-')) {
        const [a, b] = base.split('-').map(Number);
        rangeStart = Number.isFinite(a) ? a : min;
        rangeEnd = Number.isFinite(b) ? b : max;
      } else {
        const v = Number(base);
        if (!Number.isFinite(v)) continue;
        rangeStart = v;
        rangeEnd = v;
      }
    }
    rangeStart = Math.max(min, rangeStart);
    rangeEnd = Math.min(max, rangeEnd);
    for (let v = rangeStart; v <= rangeEnd; v += step) out.add(v);
  }
  return out;
}
function buildCronOccurrencesForMonth(job, year, monthIndex) {
  const schedule = job.schedule || {};
  if (schedule.kind !== 'cron' || !schedule.expr) return [];
  const parts = String(schedule.expr).trim().split(/\s+/);
  if (parts.length !== 5) return [];

  const minuteSet = parseCronField(parts[0], 0, 59);
  const hourSet = parseCronField(parts[1], 0, 23);
  const domSet = parseCronField(parts[2], 1, 31);
  const monthSet = parseCronField(parts[3], 1, 12);
  const dowSet = parseCronField(parts[4], 0, 6);
  const domWildcard = isWildcardField(parts[2]);
  const dowWildcard = isWildcardField(parts[4]);

  const minutes = Array.from(minuteSet).sort((a, b) => a - b);
  const hours = Array.from(hourSet).sort((a, b) => a - b);
  // Safety cap for pathological cron patterns (e.g. every minute).
  if (minutes.length * hours.length > 18) return [];

  const out = [];
  const daysInMonth = new Date(year, monthIndex + 1, 0).getDate();
  for (let day = 1; day <= daysInMonth; day++) {
    if (!monthSet.has(monthIndex + 1)) continue;
    const date = new Date(year, monthIndex, day);
    const dayOfWeek = date.getDay();
    const domMatch = domSet.has(day);
    const dowMatch = dowSet.has(dayOfWeek);
    let dayMatch = false;
    if (domWildcard && dowWildcard) dayMatch = true;
    else if (domWildcard) dayMatch = dowMatch;
    else if (dowWildcard) dayMatch = domMatch;
    else dayMatch = domMatch || dowMatch;
    if (!dayMatch) continue;

    for (const h of hours) {
      for (const m of minutes) {
        const when = new Date(year, monthIndex, day, h, m, 0, 0);
        const ts = when.getTime();
        out.push({
          id: `${job.id}:${ts}`,
          jobId: job.id,
          ts,
          dayKey: dayKeyFromDate(when),
          timeLabel: `${pad2(h)}:${pad2(m)}`,
          name: job.name || '(unnamed)',
        });
      }
    }
  }
  return out;
}

function buildCronCalendarData() {
  const year = cronCursor.getFullYear();
  const monthIndex = cronCursor.getMonth();
  cronOccurrencesByDay = {};

  for (const job of cronJobs) {
    if (!job.enabled) continue;
    let occurrences = buildCronOccurrencesForMonth(job, year, monthIndex);

    // Fallback: if expr unsupported, still show next run in the correct month.
    if (!occurrences.length) {
      const nextRun = job.state && job.state.nextRunAtMs;
      if (nextRun) {
        const d = new Date(nextRun);
        if (d.getFullYear() === year && d.getMonth() === monthIndex) {
          occurrences = [{
            id: `${job.id}:${nextRun}`,
            jobId: job.id,
            ts: nextRun,
            dayKey: dayKeyFromMs(nextRun),
            timeLabel: d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: false }),
            name: job.name || '(unnamed)',
          }];
        }
      }
    }

    for (const occ of occurrences) {
      if (!cronOccurrencesByDay[occ.dayKey]) cronOccurrencesByDay[occ.dayKey] = [];
      cronOccurrencesByDay[occ.dayKey].push(occ);
    }
  }

  Object.values(cronOccurrencesByDay).forEach(list => list.sort((a, b) => a.ts - b.ts));
}

function latestDoneTs(item) {
  const history = item && Array.isArray(item.history) ? item.history : [];
  for (let i = history.length - 1; i >= 0; i--) {
    const h = history[i];
    if (!h || !h.ts) continue;
    if (h.action !== 'done' && h.action !== 'completed' && !h.action.startsWith('done ')) continue;
    const ms = Date.parse(h.ts);
    if (!Number.isNaN(ms)) return ms;
  }
  return null;
}

function buildTaskCalendarData(activeItems, archivedItems, board) {
  taskCompletionsByDay = {};

  // Collect NoteFlow task IDs that are linked to MC cards — we'll prefer the card entry
  const linkedNfIds = new Set();

  // 1. MC card completions — primary source
  const cards = (board && Array.isArray(board.cards)) ? board.cards : [];
  const statuses = (board && Array.isArray(board.statuses)) ? board.statuses : [];
  const terminalIds = new Set(statuses.filter(s =>
    /done|complete/i.test(s.label || s.id)
  ).map(s => s.id));
  // Fallback: if no terminal status found, use "done"
  if (!terminalIds.size) terminalIds.add('done');

  const projects = (board && Array.isArray(board.projects)) ? board.projects : [];
  const projectMap = {};
  for (const p of projects) projectMap[p.id] = p;

  for (const card of cards) {
    if (!card || !terminalIds.has(card.status)) continue;
    const ts = Date.parse(card.updated || card.created);
    if (Number.isNaN(ts)) continue;
    const dayKey = dayKeyFromMs(ts);
    const d = new Date(ts);
    const entry = {
      id: `card:${card.slug}`,
      source: 'card',
      ts,
      dayKey,
      timeLabel: d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: false }),
      title: card.title || '(untitled)',
      card,
      project: card.project ? projectMap[card.project] : null,
    };
    if (!taskCompletionsByDay[dayKey]) taskCompletionsByDay[dayKey] = [];
    taskCompletionsByDay[dayKey].push(entry);
    // Track linked NoteFlow IDs to avoid duplication
    // (NoteFlow items linked to this card via nf-mc-sync)
  }

  // 2. NoteFlow task completions — for unlinked tasks only
  const all = [...(activeItems || []), ...(archivedItems || [])];
  // Build a set of NoteFlow IDs that are linked to any done MC card
  for (const card of cards) {
    if (!card || !terminalIds.has(card.status)) continue;
    // Check if any NoteFlow item links to this card
    for (const item of all) {
      if (item && Array.isArray(item.linked_cards) && item.linked_cards.includes(card.slug)) {
        linkedNfIds.add(item.id);
      }
    }
  }

  for (const item of all) {
    if (!item || item.type !== 'task') continue;
    if (linkedNfIds.has(item.id)) continue;  // Already represented by MC card
    const doneTs = latestDoneTs(item);
    if (!doneTs) continue;

    const dayKey = dayKeyFromMs(doneTs);
    const d = new Date(doneTs);
    const entry = {
      id: `${item.id}:${doneTs}`,
      source: 'noteflow',
      itemId: item.id,
      ts: doneTs,
      dayKey,
      timeLabel: d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: false }),
      title: item.title || '(untitled)',
      task: item,
    };
    if (!taskCompletionsByDay[dayKey]) taskCompletionsByDay[dayKey] = [];
    taskCompletionsByDay[dayKey].push(entry);
  }
  Object.values(taskCompletionsByDay).forEach(list => list.sort((a, b) => a.ts - b.ts));
}

function getDayEventsForCurrentMode() {
  if (!cronSelectedDayKey) return [];
  if (calendarMode === 'tasks') return taskCompletionsByDay[cronSelectedDayKey] || [];
  return cronOccurrencesByDay[cronSelectedDayKey] || [];
}

function getEventsForSelectedDay() {
  return getDayEventsForCurrentMode();
}

function selectCronDay(dayKey) {
  cronSelectedDayKey = dayKey;
  const events = getDayEventsForCurrentMode();
  if (calendarMode === 'tasks') {
    if (!events.length) taskSelectedCompletionId = null;
    else if (!events.some(e => e.id === taskSelectedCompletionId)) taskSelectedCompletionId = events[0].id;
  } else {
    if (!events.length) cronSelectedOccurrenceId = null;
    else if (!events.some(e => e.id === cronSelectedOccurrenceId)) cronSelectedOccurrenceId = events[0].id;
  }
  renderCronCalendar();
  renderCronDayPanel();
}

function selectCronOccurrence(occId) {
  cronSelectedOccurrenceId = occId;
  renderCronDayPanel();
  renderCronCalendar();
}

function selectTaskCompletion(eventId) {
  taskSelectedCompletionId = eventId;
  renderCronDayPanel();
  renderCronCalendar();
}

function renderCronCalendar() {
  const monthLabel = document.getElementById('cronMonthLabel');
  const grid = document.getElementById('cronCalendarGrid');
  if (!monthLabel || !grid) return;

  updateCalendarModeButtons();
  const year = cronCursor.getFullYear();
  const monthIndex = cronCursor.getMonth();
  monthLabel.textContent = cronCursor.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });

  const first = new Date(year, monthIndex, 1);
  const firstDow = first.getDay();
  const daysInMonth = new Date(year, monthIndex + 1, 0).getDate();
  const prevDays = new Date(year, monthIndex, 0).getDate();
  const todayKey = dayKeyFromDate(new Date());

  let html = '';
  for (let i = firstDow - 1; i >= 0; i--) {
    const day = prevDays - i;
    html += `<div class="calendar-day-cell outside"><div class="calendar-day-num">${day}</div></div>`;
  }

  for (let day = 1; day <= daysInMonth; day++) {
    const d = new Date(year, monthIndex, day);
    const key = dayKeyFromDate(d);
    const events = calendarMode === 'tasks' ? (taskCompletionsByDay[key] || []) : (cronOccurrencesByDay[key] || []);
    const isToday = key === todayKey;
    const isSelected = key === cronSelectedDayKey;
    const classes = [
      'calendar-day-cell',
      isToday ? 'today' : '',
      isSelected ? 'selected' : '',
    ].filter(Boolean).join(' ');

    let cellContent = '';
    if (calendarMode === 'tasks') {
      // Show count badge instead of individual task cards
      if (events.length) {
        cellContent += `<div class="calendar-task-count">${events.length} done</div>`;
      }
      // Show vault checkpoint badge if files exist for this day
      const vault = vaultDailyByDay[key];
      if (vault && vault.count > 0) {
        cellContent += `<div class="calendar-vault-badge">${vault.count} note${vault.count > 1 ? 's' : ''}</div>`;
      }
    } else {
      const eventsHtml = events.slice(0, 2).map(ev =>
        `<div class="calendar-mini-event" title="${escapeHtml(ev.timeLabel)} ${escapeHtml(ev.name)}">${escapeHtml(ev.timeLabel)} ${escapeHtml(ev.name)}</div>`
      ).join('');
      const moreHtml = events.length > 2 ? `<div class="calendar-mini-more">+${events.length - 2} more</div>` : '';
      cellContent = eventsHtml + moreHtml;
    }

    html += `
      <div class="${classes}" onclick="selectCronDay('${key}')">
        <div class="calendar-day-num">${day}</div>
        ${cellContent}
      </div>
    `;
  }

  const totalCells = firstDow + daysInMonth;
  const trailing = (7 - (totalCells % 7)) % 7;
  for (let day = 1; day <= trailing; day++) {
    html += `<div class="calendar-day-cell outside"><div class="calendar-day-num">${day}</div></div>`;
  }

  grid.innerHTML = html;
}

function renderVaultSection(dayKey) {
  const el = document.getElementById('calendarVaultSection');
  if (!el) return;
  if (calendarMode !== 'tasks' || !dayKey) { el.innerHTML = ''; return; }
  const vault = vaultDailyByDay[dayKey];
  if (!vault || !vault.files.length) { el.innerHTML = ''; return; }
  const vaultBase = `~/.openclaw/vaults/Claw/Daily/${dayKey}`;
  const filesHtml = vault.files.map(f => {
    const label = f.replace(/\.md$/, '').replace(/-/g, ' ');
    return `<div class="vault-file-item" onclick="openFileViewer('${vaultBase}/${f}')">
      <span class="vault-file-icon">&#9782;</span>
      <span>${escapeHtml(label)}</span>
    </div>`;
  }).join('');
  el.innerHTML = `
    <div class="vault-section">
      <div class="vault-section-title">Checkpoint Notes</div>
      ${filesHtml}
    </div>
  `;
}

function renderCronDayPanel() {
  const titleEl = document.getElementById('cronDayTitle');
  const eventsEl = document.getElementById('cronDayEvents');
  const detailEl = document.getElementById('cronJobDetail');
  if (!titleEl || !eventsEl || !detailEl) return;

  if (!cronSelectedDayKey) {
    titleEl.textContent = 'Select a day';
    document.getElementById('calendarVaultSection').innerHTML = '';
    eventsEl.innerHTML = '<div class="calendar-empty">No day selected.</div>';
    detailEl.innerHTML = '<div class="calendar-empty">Pick a cron event to see details.</div>';
    return;
  }

  const dayDate = dateFromDayKey(cronSelectedDayKey);
  titleEl.textContent = dayDate.toLocaleDateString('en-US', {
    weekday: 'long', month: 'long', day: 'numeric', year: 'numeric'
  });
  renderVaultSection(cronSelectedDayKey);

  const events = getEventsForSelectedDay();
  if (!events.length) {
    if (calendarMode === 'tasks') {
      eventsEl.innerHTML = '<div class="calendar-empty">No completed tasks on this day.</div>';
      detailEl.innerHTML = '<div class="calendar-empty">Pick another day to inspect completed task details.</div>';
    } else {
      eventsEl.innerHTML = '<div class="calendar-empty">No scheduled jobs on this day.</div>';
      detailEl.innerHTML = '<div class="calendar-empty">Pick another day to inspect a cron job.</div>';
    }
    return;
  }

  if (calendarMode === 'tasks') {
    if (!events.some(e => e.id === taskSelectedCompletionId)) {
      taskSelectedCompletionId = events[0].id;
    }
  } else if (!events.some(e => e.id === cronSelectedOccurrenceId)) {
    cronSelectedOccurrenceId = events[0].id;
  }

  if (calendarMode === 'tasks') {
    eventsEl.innerHTML = events.map(ev => {
      const badge = ev.source === 'card'
        ? '<span style="font-size:0.62rem;color:#93c5fd;margin-left:0.3rem">MC</span>'
        : '<span style="font-size:0.62rem;color:#86efac;margin-left:0.3rem">NF</span>';
      return `
      <button class="calendar-event-row ${ev.id === taskSelectedCompletionId ? 'active' : ''}" onclick="selectTaskCompletion('${ev.id}')">
        <div class="calendar-event-time">${escapeHtml(ev.timeLabel)}${badge}</div>
        <div class="calendar-event-name">${escapeHtml(ev.title)}</div>
      </button>`;
    }).join('');

    const sel = events.find(e => e.id === taskSelectedCompletionId) || events[0];

    if (sel.source === 'card') {
      const card = sel.card || {};
      const proj = sel.project;
      const projLabel = proj ? `<span style="color:${escapeHtml(proj.color || '#6366f1')}">${escapeHtml(proj.name)}</span>` : '—';
      const cardComments = Array.isArray(card.comments) ? card.comments : [];
      const commentsHtml = cardComments.length
        ? cardComments.map(c => `
          <div class="comment">
            <div class="comment-ts">${escapeHtml(formatDateTime(c.ts))}${c.author ? ` · ${escapeHtml(c.author)}` : ''}</div>
            <div class="comment-text">${escapeHtml(c.text || '')}</div>
          </div>
        `).join('')
        : '<div class="calendar-empty">No comments.</div>';
      const planLink = card.plan_file
        ? `<span class="vault-file-item" style="display:inline-flex;padding:0.15rem 0.3rem" onclick="openFileViewer('workspace/${escapeHtml(card.plan_file)}')"><span class="vault-file-icon">&#9782;</span> ${escapeHtml(card.plan_file.split('/').pop().replace(/\.md$/, ''))}</span>`
        : '—';

      detailEl.innerHTML = `
        <div class="calendar-detail-grid">
          <div class="calendar-detail-item"><span class="k">Card</span>${escapeHtml(card.title || '(untitled)')}</div>
          <div class="calendar-detail-item"><span class="k">Slug</span><code>${escapeHtml(card.slug || '')}</code></div>
          <div class="calendar-detail-item"><span class="k">Completed</span>${escapeHtml(formatMsDateTime(sel.ts))}</div>
          <div class="calendar-detail-item"><span class="k">Project</span>${projLabel}</div>
          <div class="calendar-detail-item"><span class="k">Plan</span>${planLink}</div>
        </div>
        ${card.description ? `<div class="section-label" style="margin-top:0.8rem">Description</div><div class="notes-body">${escapeHtml(card.description)}</div>` : ''}
        <div class="section-label" style="margin-top:0.8rem">Comments</div>
        ${commentsHtml}
      `;
    } else {
      const item = sel.task || {};
      const comments = Array.isArray(item.subnotes) ? item.subnotes : [];
      const tags = Array.isArray(item.tags) ? item.tags : [];
      const tagsHtml = tags.length ? tags.map(t => `<span class="tag-pill">${escapeHtml(t)}</span>`).join('') : '<span class="calendar-empty">none</span>';
      const commentsHtml = comments.length
        ? comments.map(c => `
          <div class="comment">
            <div class="comment-ts">${escapeHtml(formatDateTime(c.ts))}</div>
            <div class="comment-text">${escapeHtml(c.text || '')}</div>
          </div>
        `).join('')
        : '<div class="calendar-empty">No comments.</div>';

      detailEl.innerHTML = `
        <div class="calendar-detail-grid">
          <div class="calendar-detail-item"><span class="k">Task</span>${escapeHtml(item.title || '(untitled)')}</div>
          <div class="calendar-detail-item"><span class="k">ID</span><code>${escapeHtml(item.id || '')}</code></div>
          <div class="calendar-detail-item"><span class="k">Completed</span>${escapeHtml(formatMsDateTime(sel.ts))}</div>
          <div class="calendar-detail-item"><span class="k">Type</span>${escapeHtml(item.type || 'task')}</div>
          <div class="calendar-detail-item"><span class="k">Due</span>${escapeHtml(formatDateTime(item.due)) || '—'}</div>
          <div class="calendar-detail-item"><span class="k">Reminder</span>${escapeHtml(formatDateTime(item.remind)) || '—'}</div>
        </div>
        <div class="section-label" style="margin-top:0.8rem">Tags</div>
        <div>${tagsHtml}</div>
        <div class="section-label" style="margin-top:0.8rem">Notes</div>
        ${item.body ? `<div class="notes-body">${escapeHtml(item.body)}</div>` : '<div class="calendar-empty">No notes.</div>'}
        <div class="section-label" style="margin-top:0.8rem">Comments</div>
        ${commentsHtml}
      `;
    }
    return;
  }

  eventsEl.innerHTML = events.map(ev => `
    <button class="calendar-event-row ${ev.id === cronSelectedOccurrenceId ? 'active' : ''}" onclick="selectCronOccurrence('${ev.id}')">
      <div class="calendar-event-time">${escapeHtml(ev.timeLabel)}</div>
      <div class="calendar-event-name">${escapeHtml(ev.name)}</div>
    </button>
  `).join('');

  const selected = events.find(e => e.id === cronSelectedOccurrenceId) || events[0];
  const job = cronJobs.find(j => j.id === selected.jobId);
  if (!job) {
    detailEl.innerHTML = '<div class="calendar-empty">Job details not found.</div>';
    return;
  }

  const schedule = job.schedule || {};
  const state = job.state || {};
  const delivery = job.delivery || {};
  const payload = job.payload || {};
  const runs = job.runs || [];

  const runsHtml = runs.length
    ? `<div class="calendar-runs">
        ${runs.slice().reverse().map(run => `
          <div class="calendar-run">
            <div class="calendar-run-top">
              <span>${formatMsDateTime(run.runAtMs || run.ts)}</span>
              ${formatRunStatus(run.status || run.deliveryStatus)}
            </div>
            <div class="calendar-run-summary" title="${escapeHtml(run.summary || '')}">${escapeHtml(run.summary || '(no summary)')}</div>
          </div>
        `).join('')}
      </div>`
    : '<div class="calendar-empty" style="margin-top:0.45rem">No recent run logs for this job.</div>';

  detailEl.innerHTML = `
    <div class="calendar-detail-grid">
      <div class="calendar-detail-item"><span class="k">Job</span>${escapeHtml(job.name || '(unnamed)')}</div>
      <div class="calendar-detail-item"><span class="k">ID</span><code>${escapeHtml(job.id || '')}</code></div>
      <div class="calendar-detail-item"><span class="k">Schedule</span><code>${escapeHtml(schedule.expr || schedule.kind || '—')}</code></div>
      <div class="calendar-detail-item"><span class="k">Timezone</span>${escapeHtml(schedule.tz || 'local')}</div>
      <div class="calendar-detail-item"><span class="k">Next Run</span>${escapeHtml(formatMsDateTime(state.nextRunAtMs))}</div>
      <div class="calendar-detail-item"><span class="k">Last Run</span>${escapeHtml(formatMsDateTime(state.lastRunAtMs))}</div>
      <div class="calendar-detail-item"><span class="k">Delivery</span>${escapeHtml(delivery.mode || '—')} ${delivery.channel ? `→ ${escapeHtml(delivery.channel)}` : ''}</div>
      <div class="calendar-detail-item"><span class="k">Message</span>${escapeHtml(payload.message || '(none)')}</div>
    </div>
    <div class="section-label" style="margin-top:0.8rem">Recent Runs</div>
    ${runsHtml}
  `;
}

async function loadCronCalendar() {
  const [jobsRes, itemsRes, archiveRes, vaultRes, boardRes] = await Promise.all([
    api('GET', '/api/cron/jobs'),
    api('GET', '/api/items'),
    api('GET', '/api/archive'),
    api('GET', '/api/vault/daily'),
    api('GET', '/api/board'),
  ]);
  if (!jobsRes.error) cronJobs = jobsRes.jobs || [];
  const board = boardRes && !boardRes.error ? boardRes : null;
  buildTaskCalendarData(
    itemsRes && !itemsRes.error ? itemsRes.items : [],
    archiveRes && !archiveRes.error ? archiveRes.items : [],
    board
  );
  buildCronCalendarData();
  // Index vault daily folders by date
  vaultDailyByDay = {};
  if (vaultRes && !vaultRes.error && Array.isArray(vaultRes.folders)) {
    for (const f of vaultRes.folders) {
      vaultDailyByDay[f.date] = { files: f.files || [], count: f.count || 0 };
    }
  }

  if (!cronSelectedDayKey) {
    const today = new Date();
    if (today.getFullYear() === cronCursor.getFullYear() && today.getMonth() === cronCursor.getMonth()) {
      cronSelectedDayKey = dayKeyFromDate(today);
    } else {
      cronSelectedDayKey = dayKeyFromDate(new Date(cronCursor.getFullYear(), cronCursor.getMonth(), 1));
    }
  }

  if (!cronOccurrencesByDay[cronSelectedDayKey]) {
    cronSelectedOccurrenceId = null;
  }
  if (!taskCompletionsByDay[cronSelectedDayKey]) {
    taskSelectedCompletionId = null;
  }

  renderCronCalendar();
  renderCronDayPanel();
}

function cronPrevMonth() {
  cronCursor = new Date(cronCursor.getFullYear(), cronCursor.getMonth() - 1, 1);
  cronSelectedDayKey = dayKeyFromDate(new Date(cronCursor.getFullYear(), cronCursor.getMonth(), 1));
  cronSelectedOccurrenceId = null;
  loadCronCalendar();
}

function cronNextMonth() {
  cronCursor = new Date(cronCursor.getFullYear(), cronCursor.getMonth() + 1, 1);
  cronSelectedDayKey = dayKeyFromDate(new Date(cronCursor.getFullYear(), cronCursor.getMonth(), 1));
  cronSelectedOccurrenceId = null;
  loadCronCalendar();
}

function cronToday() {
  const now = new Date();
  cronCursor = new Date(now.getFullYear(), now.getMonth(), 1);
  cronSelectedDayKey = dayKeyFromDate(now);
  cronSelectedOccurrenceId = null;
  loadCronCalendar();
}

// ══════════════════════════════════════════════
//  STACK TAB — Mission Control Session Stack
// ══════════════════════════════════════════════
function makeId(prefix) {
  return `${prefix}-${Math.random().toString(36).slice(2, 10)}`;
}

function normalizeStackItem(item) {
  return {
    id: item.id || makeId('stk'),
    title: item.title || 'Untitled',
    source: item.source === 'board' ? 'board' : 'custom',
    boardSlug: item.boardSlug || null,
    notes: Array.isArray(item.notes) ? item.notes.filter(n => typeof n === 'string') : [],
    createdAt: item.createdAt || new Date().toISOString(),
  };
}

function saveStackState() {
  // Persist to server (fire-and-forget for responsiveness)
  api('PUT', '/api/stack', { items: stackItems });
}

async function loadStackState() {
  try {
    const res = await api('GET', '/api/stack');
    if (res && Array.isArray(res.items) && res.items.length) {
      stackItems = res.items.map(normalizeStackItem);
    } else {
      // Migrate from localStorage if server is empty
      const local = JSON.parse(localStorage.getItem(STACK_STORAGE_KEY) || '[]');
      if (Array.isArray(local) && local.length) {
        stackItems = local.map(normalizeStackItem);
        saveStackState(); // push to server
        localStorage.removeItem(STACK_STORAGE_KEY);
      } else {
        stackItems = [];
      }
    }
  } catch (_) {
    stackItems = [];
  }
}

let stackSelectedId = null;
let stackDragId = null;
let stackOpenMenuId = null;

function getDoneStatusId() {
  const statuses = board.statuses || [];
  const done = statuses.find(s => (s.id || s) === 'done');
  if (done) return 'done';
  const doneByLabel = statuses.find(s => String(s.label || '').trim().toLowerCase() === 'done');
  if (doneByLabel) return doneByLabel.id || doneByLabel;
  return statuses.length ? (statuses[statuses.length - 1].id || statuses[statuses.length - 1]) : 'done';
}

// ── Unified input with suggestions ──
let stackSugIndex = -1; // -1 = "create custom" row, 0+ = board matches

function stackInputChanged() {
  stackSugIndex = -1;
  renderStackSuggestions();
}

function stackInputFocus() {
  renderStackSuggestions();
}

function getStackMatches() {
  const input = document.getElementById('stackInput');
  const q = (input ? input.value : '').trim().toLowerCase();
  if (!q) return [];
  return (board.cards || []).filter(c =>
    c.title.toLowerCase().includes(q) || String(c.slug).toLowerCase().includes(q)
  ).slice(0, 8);
}

function renderStackSuggestions() {
  const input = document.getElementById('stackInput');
  const dd = document.getElementById('stackSuggest');
  if (!input || !dd) return;
  const q = (input.value || '').trim();
  if (!q) { dd.classList.remove('open'); return; }

  const matches = getStackMatches();
  let html = '';
  matches.forEach((c, i) => {
    const statusColor = (board.statuses || []).find(s => s.id === c.status);
    const sColor = statusColor ? statusColor.color : '#94a3b8';
    html += `<div class="stack-sug-item${stackSugIndex === i ? ' active' : ''}" onmousedown="stackPickBoard('${escapeHtml(c.slug)}')">`;
    html += `<span>${escapeHtml(c.title)}</span>`;
    html += `<span class="sug-slug">${escapeHtml(c.slug)}</span>`;
    html += `<span class="sug-status" style="color:${sColor};border-color:${sColor}44">${escapeHtml(c.status)}</span>`;
    html += `</div>`;
  });
  // Always show "create as custom" at the bottom
  html += `<div class="stack-sug-create${stackSugIndex === -1 ? ' active' : ''}" onmousedown="stackAddCustom()">`;
  html += `<span class="sug-plus">+</span> Create <strong>&quot;${escapeHtml(q)}&quot;</strong> as custom task`;
  html += `</div>`;

  dd.innerHTML = html;
  dd.classList.add('open');
}

function stackInputKey(e) {
  const matches = getStackMatches();
  const maxIdx = matches.length - 1;
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    stackSugIndex = stackSugIndex < maxIdx ? stackSugIndex + 1 : -1;
    renderStackSuggestions();
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    stackSugIndex = stackSugIndex <= -1 ? maxIdx : stackSugIndex - 1;
    renderStackSuggestions();
  } else if (e.key === 'Enter') {
    e.preventDefault();
    if (stackSugIndex >= 0 && stackSugIndex <= maxIdx) {
      stackPickBoard(matches[stackSugIndex].slug);
    } else {
      stackAddCustom();
    }
  } else if (e.key === 'Escape') {
    const dd = document.getElementById('stackSuggest');
    if (dd) dd.classList.remove('open');
  }
}

function stackPickBoard(slug) {
  const card = (board.cards || []).find(c => c.slug === slug);
  if (!card) return;
  const item = normalizeStackItem({
    id: makeId('stk'), title: card.title,
    source: 'board', boardSlug: card.slug,
    notes: [], createdAt: new Date().toISOString(),
  });
  stackItems.unshift(item);
  const input = document.getElementById('stackInput');
  if (input) input.value = '';
  const dd = document.getElementById('stackSuggest');
  if (dd) dd.classList.remove('open');
  saveStackState();
  renderStackList();
  renderTaskPool();
}

function getStackIndex(id) {
  return stackItems.findIndex(i => i.id === id);
}

// ── Kebab menu toggle ──
function stackToggleMenu(id) {
  if (stackOpenMenuId && stackOpenMenuId !== id) {
    const prev = document.getElementById(`stack-menu-${stackOpenMenuId}`);
    if (prev) prev.style.display = 'none';
  }
  if (stackOpenMenuId === id) {
    const m = document.getElementById(`stack-menu-${id}`);
    if (m) m.style.display = 'none';
    stackOpenMenuId = null;
    return;
  }
  stackOpenMenuId = id;
  const menu = document.getElementById(`stack-menu-${id}`);
  if (menu) menu.style.display = 'block';
  setTimeout(() => {
    document.addEventListener('click', function _close() {
      if (stackOpenMenuId) {
        const m = document.getElementById(`stack-menu-${stackOpenMenuId}`);
        if (m) m.style.display = 'none';
        stackOpenMenuId = null;
      }
      document.removeEventListener('click', _close);
    }, { once: true });
  }, 0);
}

// ── Completion modal (replaces confirm()) ──
function showCompletionModal(title) {
  return new Promise((resolve) => {
    const container = document.getElementById('stackCompletionModal');
    container.innerHTML = `
      <div class="stack-modal-overlay" onclick="if(event.target===this)stackResolveModal('cancel')">
        <div class="stack-modal">
          <h4>Remove from Stack</h4>
          <p>What should happen with <span class="stack-modal-task">${escapeHtml(title)}</span>?</p>
          <div class="stack-modal-actions">
            <button class="stack-modal-btn cancel-btn" onclick="stackResolveModal('cancel')">Cancel</button>
            <button class="stack-modal-btn remove-btn" onclick="stackResolveModal('remove')">Just Remove</button>
            <button class="stack-modal-btn done-btn" onclick="stackResolveModal('done')">Mark Done</button>
          </div>
        </div>
      </div>`;
    window._stackModalResolve = resolve;
  });
}

function stackResolveModal(action) {
  const container = document.getElementById('stackCompletionModal');
  if (container) container.innerHTML = '';
  if (window._stackModalResolve) {
    window._stackModalResolve(action);
    window._stackModalResolve = null;
  }
}

// ── Select / expand ──
function stackSelect(id) {
  stackSelectedId = stackSelectedId === id ? null : id;
  renderStackList();
}

// ── Render ──
function renderStackList() {
  const list = document.getElementById('stackList');
  if (!list) return;
  if (!stackItems.length) {
    list.innerHTML = `<div class="stack-empty">
      <div class="stack-empty-icon">&#x1F6F0;</div>
      <div class="stack-empty-text">No active missions.<br>Add tasks or link board cards to build your stack.</div>
    </div>`;
    return;
  }
  let html = '';
  stackItems.forEach((item, idx) => {
    const isTop = idx === 0;
    const isSelected = item.id === stackSelectedId;
    const cls = ['stack-card'];
    if (isTop) cls.push('top');
    if (isSelected) cls.push('selected');

    html += `<div class="${cls.join(' ')}" data-stack-id="${item.id}" data-stack-idx="${idx}" draggable="true"
      onclick="stackSelect('${item.id}')"
      ondragstart="stackDragStart(event,'${item.id}')" ondragend="stackDragEnd(event)"
      ondragover="stackCardDragOver(event,'${item.id}')" ondragleave="stackCardDragLeave(event,'${item.id}')"
      ondrop="stackCardDrop(event,'${item.id}')">`;

    // ── Header row (compact) ──
    html += `<div class="stack-card-header">`;
    html += `<span class="stack-drag" title="Drag to reorder">&#x2630;</span>`;
    html += `<span class="stack-pos ${isTop ? 'is-top' : 'is-num'}">${isTop ? 'TOP' : idx + 1}</span>`;
    html += `<span class="stack-badge ${item.source === 'board' ? 'brd' : 'cst'}">${item.source === 'board' ? 'Board' : 'Custom'}</span>`;
    html += `<span class="stack-card-title">${escapeHtml(item.title)}</span>`;
    if (item.boardSlug) {
      html += `<span class="stack-badge slug">${escapeHtml(item.boardSlug)}</span>`;
    }
    const boardCard = item.boardSlug ? (board.cards || []).find(c => c.slug === item.boardSlug) : null;
    const comments = boardCard ? (boardCard.comments || []) : [];
    const noteCount = boardCard ? comments.length : item.notes.length;
    if (noteCount) {
      html += `<span class="stack-note-hint">&#x1F4DD; ${noteCount}</span>`;
    }
    // ── Move arrows ──
    html += `<div class="stack-arrows">`;
    html += `<button class="stack-arrow-btn" onclick="event.stopPropagation();stackMoveUp('${item.id}')" title="Move up" ${idx === 0 ? 'disabled' : ''}>&#x25B2;</button>`;
    html += `<button class="stack-arrow-btn" onclick="event.stopPropagation();stackMoveDown('${item.id}')" title="Move down" ${idx === stackItems.length - 1 ? 'disabled' : ''}>&#x25BC;</button>`;
    html += `</div>`;

    html += `<div class="stack-kebab-wrap">`;
    html += `<button class="stack-kebab" onclick="event.stopPropagation();stackToggleMenu('${item.id}')" title="Actions">&#x22EE;</button>`;
    html += `<div class="stack-menu" id="stack-menu-${item.id}" style="display:none">`;
    if (!item.boardSlug) {
      html += `<button class="stack-menu-item" onclick="event.stopPropagation();stackPushToBoard('${item.id}')">Push to Board</button>`;
    } else {
      html += `<button class="stack-menu-item" onclick="event.stopPropagation();openCardDetail('${item.boardSlug}')">Open Card</button>`;
    }
    html += `<button class="stack-menu-item danger" onclick="event.stopPropagation();stackDeleteItem('${item.id}')">Remove</button>`;
    html += `</div></div>`;
    html += `</div>`;

    // ── Expanded body ──
    if (isSelected) {
      html += `<div class="stack-card-body" onclick="event.stopPropagation()">`;
      html += `<input class="stack-edit-title" value="${escapeHtml(item.title)}"
        onchange="stackRename('${item.id}',this.value)" onkeydown="if(event.key==='Enter')this.blur()">`;
      html += `<div class="stack-card-meta">${item.boardSlug ? 'Linked: ' + escapeHtml(item.boardSlug) : 'Stack-only'} &middot; ${noteCount} comment${noteCount !== 1 ? 's' : ''}</div>`;
      html += `<div class="stack-notes-list">`;
      if (boardCard) {
        // Board-linked: render from board card comments
        if (!comments.length) {
          html += `<div style="color:#475569;font-size:0.63rem;font-style:italic;padding:0.15rem 0">No comments yet</div>`;
        } else {
          comments.forEach((c, ci) => {
            html += `<div class="stack-note-row">`;
            html += `<span class="stack-note-text"><span style="color:#64748b;font-size:0.58rem">[${escapeHtml(c.author)}] ${formatDateTime(c.ts)}</span><br>${escapeHtml(c.text)}</span>`;
            html += `<span class="stack-note-x" onclick="event.stopPropagation();stackDeleteComment('${item.boardSlug}',${ci})" title="Remove">&#x2715;</span>`;
            html += `</div>`;
          });
        }
      } else {
        // Custom stack-only: keep local notes
        if (!item.notes.length) {
          html += `<div style="color:#475569;font-size:0.63rem;font-style:italic;padding:0.15rem 0">No comments yet</div>`;
        } else {
          item.notes.forEach((note, ni) => {
            html += `<div class="stack-note-row">`;
            html += `<span class="stack-note-text">${escapeHtml(note)}</span>`;
            html += `<span class="stack-note-x" onclick="event.stopPropagation();stackDeleteNote('${item.id}',${ni})" title="Remove">&#x2715;</span>`;
            html += `</div>`;
          });
        }
      }
      html += `</div>`;
      html += `<div class="stack-add-note">`;
      html += `<input id="stack-note-input-${item.id}" type="text" placeholder="+ Add comment..." onclick="event.stopPropagation()"
        onkeydown="event.stopPropagation();if(event.key==='Enter')stackAddComment('${item.id}')">`;
      html += `<button onclick="event.stopPropagation();stackAddComment('${item.id}')">Post</button>`;
      html += `</div>`;
      html += `</div>`;
    }

    html += `</div>`;
  });
  list.innerHTML = html;
}

async function loadStackTab() {
  const [boardRes, stackRes, nfRes, colsRes] = await Promise.all([
    api('GET', '/api/board'),
    api('GET', '/api/stack'),
    api('GET', '/api/items'),
    api('GET', '/api/columns'),
  ]);
  if (!boardRes.error) board = boardRes;
  if (stackRes && Array.isArray(stackRes.items)) {
    stackItems = stackRes.items.map(normalizeStackItem);
  }
  poolNfItems = nfRes.items || [];
  poolNfColumns = colsRes.columns || [];
  // Restore pool toggle state
  const saved = localStorage.getItem('mc-pool-source');
  if (saved && saved !== poolSource) switchPoolSource(saved);
  renderStackList();
  renderTaskPool();
}

// Close suggestion dropdown on outside click
document.addEventListener('click', function(e) {
  const wrap = document.querySelector('.stack-input-wrap');
  const dd = document.getElementById('stackSuggest');
  if (dd && wrap && !wrap.contains(e.target)) dd.classList.remove('open');
});

function stackAddCustom() {
  const input = document.getElementById('stackInput');
  if (!input) return;
  const title = input.value.trim();
  if (!title) return;
  const item = normalizeStackItem({
    id: makeId('stk'), title,
    source: 'custom', boardSlug: null,
    notes: [], createdAt: new Date().toISOString(),
  });
  stackItems.unshift(item);
  input.value = '';
  const dd = document.getElementById('stackSuggest');
  if (dd) dd.classList.remove('open');
  saveStackState();
  renderStackList();
  renderTaskPool();
}

function stackRename(id, value) {
  const idx = getStackIndex(id);
  if (idx < 0) return;
  const title = (value || '').trim();
  if (!title) return;
  stackItems[idx].title = title;
  saveStackState();
}

async function stackAddComment(id) {
  const idx = getStackIndex(id);
  if (idx < 0) return;
  const input = document.getElementById(`stack-note-input-${id}`);
  if (!input) return;
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  const slug = stackItems[idx].boardSlug;
  if (slug) {
    // Board-linked: post to board card comments (single source of truth)
    await api('POST', `/api/board/cards/${slug}/comments`, { text, author: 'user' });
    await loadBoard();
  } else {
    // Stack-only: keep local notes
    stackItems[idx].notes.push(text);
    saveStackState();
  }
  renderStackList();
  const newInput = document.getElementById(`stack-note-input-${id}`);
  if (newInput) newInput.focus();
}

async function stackDeleteComment(slug, commentIdx) {
  await api('DELETE', `/api/board/cards/${slug}/comments/${commentIdx}`);
  await loadBoard();
  renderStackList();
}

function stackDeleteNote(id, noteIdx) {
  const idx = getStackIndex(id);
  if (idx < 0) return;
  stackItems[idx].notes.splice(noteIdx, 1);
  saveStackState();
  renderStackList();
}

function showPushToBoardModal(title) {
  return new Promise((resolve) => {
    const projects = board.projects || [];
    let options = '<option value="">— No project —</option>';
    projects.forEach(p => {
      options += `<option value="${escapeHtml(p.id)}">${escapeHtml(p.name)}</option>`;
    });
    const container = document.getElementById('stackCompletionModal');
    container.innerHTML = `
      <div class="stack-modal-overlay" onclick="if(event.target===this)stackResolvePush(null)">
        <div class="stack-modal">
          <h4>Push to Task Board</h4>
          <p><span class="stack-modal-task">${escapeHtml(title)}</span> will be added as <strong style="color:#3b82f6">Active</strong>.</p>
          <label>Assign to project</label>
          <select id="stackPushProject">${options}</select>
          <div class="stack-modal-actions">
            <button class="stack-modal-btn cancel-btn" onclick="stackResolvePush(null)">Cancel</button>
            <button class="stack-modal-btn push-btn" onclick="stackResolvePush(document.getElementById('stackPushProject').value)">Push</button>
          </div>
        </div>
      </div>`;
    window._stackPushResolve = resolve;
  });
}

function stackResolvePush(projectId) {
  const container = document.getElementById('stackCompletionModal');
  if (container) container.innerHTML = '';
  if (window._stackPushResolve) {
    window._stackPushResolve(projectId);
    window._stackPushResolve = null;
  }
}

async function stackPushToBoard(id) {
  const idx = getStackIndex(id);
  if (idx < 0) return;
  const item = stackItems[idx];
  if (item.boardSlug) return;
  const projectId = await showPushToBoardModal(item.title);
  if (projectId === null) return; // cancelled
  const payload = {
    title: item.title,
    description: item.notes && item.notes.length ? item.notes.join('\n') : 'Created from Stack tab',
    status: 'active',
    project: projectId || null,
  };
  const res = await api('POST', '/api/board/cards', payload);
  if (res && res.card && res.card.slug) {
    item.boardSlug = res.card.slug;
    item.source = 'board';
  }
  saveStackState();
  await loadStackTab();
}

async function stackFinalizeBoardCompletion(item) {
  const doneStatus = getDoneStatusId();
  if (item.boardSlug) {
    await api('POST', `/api/board/cards/${item.boardSlug}/move`, { status: doneStatus });
  } else {
    await api('POST', '/api/board/cards', {
      title: item.title,
      description: item.notes && item.notes.length ? item.notes.join('\n') : 'Completed from Stack tab',
      status: doneStatus,
    });
  }
}

async function stackDeleteItem(id) {
  const idx = getStackIndex(id);
  if (idx < 0) return;
  const item = stackItems[idx];
  const action = await showCompletionModal(item.title);
  if (action === 'cancel') return;
  if (action === 'done') await stackFinalizeBoardCompletion(item);
  stackItems.splice(idx, 1);
  if (stackSelectedId === id) {
    stackSelectedId = stackItems.length ? stackItems[Math.max(0, idx - 1)].id : null;
  }
  saveStackState();
  await loadStackTab();
}

async function stackPopTop() {
  if (!stackItems.length) return;
  const top = stackItems[0];
  const action = await showCompletionModal(top.title);
  if (action === 'cancel') return;
  if (action === 'done') await stackFinalizeBoardCompletion(top);
  stackItems.shift();
  if (stackSelectedId === top.id) {
    stackSelectedId = stackItems.length ? stackItems[0].id : null;
  }
  saveStackState();
  await loadStackTab();
}

function stackMove(fromIdx, toIdx) {
  if (fromIdx === toIdx || fromIdx < 0 || toIdx < 0 || fromIdx >= stackItems.length || toIdx >= stackItems.length) return;
  const [item] = stackItems.splice(fromIdx, 1);
  stackItems.splice(toIdx, 0, item);
  saveStackState();
  renderStackList();
  renderTaskPool();
}
function stackMoveUp(id) {
  const idx = getStackIndex(id);
  if (idx > 0) stackMove(idx, idx - 1);
}
function stackMoveDown(id) {
  const idx = getStackIndex(id);
  if (idx < stackItems.length - 1) stackMove(idx, idx + 1);
}

function stackDragStart(e, id) {
  stackDragId = id;
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', id);
  setTimeout(() => {
    const card = e.currentTarget.closest('.stack-card');
    if (card) card.classList.add('dragging');
  }, 0);
}

function stackDragEnd(e) {
  stackDragId = null;
  document.querySelectorAll('.stack-card.dragging, .stack-card.drag-over').forEach(el => {
    el.classList.remove('dragging', 'drag-over');
  });
}

function stackCardDragOver(e, id) {
  e.preventDefault();
  // Allow pool drops too
  if (!stackDragId && !e.dataTransfer.types.includes('application/pool-item')) return;
  if (stackDragId === id) return;
  const card = e.currentTarget.closest('.stack-card');
  if (card) card.classList.add('drag-over');
}

function stackCardDragLeave(e, id) {
  const card = e.currentTarget.closest('.stack-card');
  if (card) card.classList.remove('drag-over');
}

function stackCardDrop(e, id) {
  e.preventDefault();
  // Handle pool drops onto a specific card position
  const poolData = e.dataTransfer.getData('application/pool-item');
  if (poolData) {
    try {
      const { source, id: poolId } = JSON.parse(poolData);
      const toIdx = getStackIndex(id);
      poolInsertAtIndex(source, poolId, toIdx);
    } catch(err) {}
    return;
  }
  const fromIdx = getStackIndex(stackDragId);
  const toIdx = getStackIndex(id);
  stackMove(fromIdx, toIdx);
  stackDragId = null;
}

function stackListDragOver(e) {
  e.preventDefault();
  // Visual cue for pool drops
  if (e.dataTransfer.types.includes('application/pool-item')) {
    e.currentTarget.classList.add('drag-pool-over');
  }
}

function stackListDragLeave(e) {
  e.currentTarget.classList.remove('drag-pool-over');
}

function stackListDrop(e) {
  e.preventDefault();
  e.currentTarget.classList.remove('drag-pool-over');
  // Handle pool drops to end of list
  const poolData = e.dataTransfer.getData('application/pool-item');
  if (poolData) {
    try {
      const { source, id } = JSON.parse(poolData);
      poolInsertAtIndex(source, id, 0); // insert at top
    } catch(err) {}
    return;
  }
  if (!stackDragId || !stackItems.length) return;
  const fromIdx = getStackIndex(stackDragId);
  const toIdx = stackItems.length - 1;
  stackMove(fromIdx, toIdx);
  stackDragId = null;
}

function poolInsertAtIndex(source, poolId, idx) {
  let item;
  if (source === 'board') {
    const card = (board.cards || []).find(c => c.slug === poolId);
    if (!card) return;
    // Check if already in stack
    if (stackItems.some(i => i.boardSlug === poolId)) return;
    item = normalizeStackItem({
      id: makeId('stk'), title: card.title,
      source: 'board', boardSlug: card.slug,
      notes: [], createdAt: new Date().toISOString(),
    });
  } else {
    const nfItem = (poolNfItems || []).find(i => i.id === poolId);
    if (!nfItem) return;
    item = normalizeStackItem({
      id: makeId('stk'), title: nfItem.title,
      source: 'custom', boardSlug: null,
      notes: [], createdAt: new Date().toISOString(),
    });
  }
  if (idx >= 0 && idx < stackItems.length) {
    stackItems.splice(idx, 0, item);
  } else {
    stackItems.unshift(item);
  }
  saveStackState();
  renderStackList();
  renderTaskPool();
}

// ══════════════════════════════════════════════
//  TASK POOL SIDEBAR
// ══════════════════════════════════════════════

function switchPoolSource(source) {
  poolSource = source;
  localStorage.setItem('mc-pool-source', source);
  document.getElementById('poolToggleBoard').classList.toggle('active', source === 'board');
  document.getElementById('poolToggleNF').classList.toggle('active', source === 'noteflow');
  renderTaskPool();
}

function renderTaskPool() {
  const list = document.getElementById('taskPoolList');
  if (!list) return;
  const stackSlugs = new Set(stackItems.filter(i => i.boardSlug).map(i => i.boardSlug));
  const stackTitles = new Set(stackItems.map(i => i.title.toLowerCase()));

  if (poolSource === 'board') {
    const doneId = getDoneStatusId();
    const cards = (board.cards || []).filter(c => {
      if (stackSlugs.has(c.slug)) return false;
      if (c.status === doneId) return false;
      return true;
    });
    if (!cards.length) {
      list.innerHTML = '<div class="task-pool-empty">No available board cards</div>';
      return;
    }
    const statuses = board.statuses || [];
    list.innerHTML = cards.map(c => {
      const st = statuses.find(s => (s.id || s) === c.status);
      const stLabel = st ? (st.label || st.id || c.status) : c.status;
      const stColor = st && st.color ? st.color : '#64748b';
      return `<div class="task-pool-card" draggable="true"
        ondragstart="poolDragStart(event,'board','${c.slug}')"
        ondragend="poolDragEnd(event)"
        ondblclick="poolAddToStack('board','${c.slug}')"
        title="${escapeHtml(c.title)}">
        <span class="task-pool-card-title">${escapeHtml(c.title)}</span>
        <span class="task-pool-badge" style="color:${stColor};border-color:${stColor}44">${escapeHtml(stLabel)}</span>
      </div>`;
    }).join('');
  } else {
    const items = (poolNfItems || []).filter(i => {
      if (i.status === 'done') return false;
      if (stackTitles.has(i.title.toLowerCase())) return false;
      return true;
    });
    if (!items.length) {
      list.innerHTML = '<div class="task-pool-empty">No open NoteFlow items</div>';
      return;
    }
    list.innerHTML = items.map(i => {
      const col = (poolNfColumns || []).find(c => c.id === (i.type || i.column));
      const colLabel = col ? (col.label || col.name) : '';
      const colColor = col && col.color ? col.color : '#64748b';
      return `<div class="task-pool-card" draggable="true"
        ondragstart="poolDragStart(event,'noteflow','${i.id}')"
        ondragend="poolDragEnd(event)"
        ondblclick="poolAddToStack('noteflow','${i.id}')"
        title="${escapeHtml(i.title)}">
        <span class="task-pool-card-title">${escapeHtml(i.title)}</span>
        ${colLabel ? `<span class="task-pool-badge" style="color:${colColor};border-color:${colColor}44">${escapeHtml(colLabel)}</span>` : ''}
      </div>`;
    }).join('');
  }
}

function poolDragStart(e, source, id) {
  e.dataTransfer.effectAllowed = 'copy';
  e.dataTransfer.setData('application/pool-item', JSON.stringify({ source, id }));
  setTimeout(() => e.target.classList.add('dragging'), 0);
}

function poolDragEnd(e) {
  e.target.classList.remove('dragging');
}

function poolAddToStack(source, id) {
  if (source === 'board') {
    stackPickBoard(id);
  } else {
    const nfItem = (poolNfItems || []).find(i => i.id === id);
    if (!nfItem) return;
    const item = normalizeStackItem({
      id: makeId('stk'), title: nfItem.title,
      source: 'custom', boardSlug: null,
      notes: [], createdAt: new Date().toISOString(),
    });
    stackItems.unshift(item);
    saveStackState();
    renderStackList();
  }
  renderTaskPool();
}

async function loadNoteFlow() {
  const [itemsRes, colsRes, boardRes, archiveRes] = await Promise.all([
    api('GET', '/api/items'),
    api('GET', '/api/columns'),
    api('GET', '/api/board'),
    api('GET', '/api/archive'),
  ]);
  nfItems = itemsRes.items || [];
  nfColumns = colsRes.columns || [];
  if (!boardRes.error) board = boardRes;
  archiveItems = archiveRes.items || [];
  renderNoteFlow();
}

function renderLinkedCardBadges(linkedSlugs) {
  if (!linkedSlugs || !linkedSlugs.length) return '';
  return linkedSlugs.map(slug => {
    const card = (board.cards || []).find(c => c.slug === slug);
    if (!card) return `<div class="linked-card-badge" title="Linked card: ${escapeHtml(slug)}">&#x1F517; ${escapeHtml(slug)}</div>`;
    const color = getStatusColor(card.status);
    return `<div class="linked-card-badge" title="Linked: ${escapeHtml(card.title)}"><span class="linked-card-status" style="background:${color}"></span>&#x1F517; ${escapeHtml(card.title)}</div>`;
  }).join('');
}

function renderLinkedCardsSection(linkedSlugs) {
  if (!linkedSlugs || !linkedSlugs.length) return '';
  const label = linkedSlugs.length === 1 ? 'Linked Card' : `Linked Cards (${linkedSlugs.length})`;
  let html = `<div class="section-label">${label}</div>`;
  for (const slug of linkedSlugs) {
    const card = (board.cards || []).find(c => c.slug === slug);
    if (!card) {
      html += `<div style="color:#64748b;font-size:0.8rem;font-style:italic;margin-bottom:0.3rem">Card "${escapeHtml(slug)}" not found</div>`;
      continue;
    }
    const color = getStatusColor(card.status);
    const proj = board.projects.find(p => p.id === card.project);
    const projName = proj ? proj.name : card.project || 'None';
    html += `<div style="background:#1e293b;border-radius:6px;padding:0.5rem;font-size:0.82rem;margin-bottom:0.3rem">`;
    html += `<div style="display:flex;align-items:center;gap:0.4rem">`;
    html += `<span class="linked-card-status" style="background:${color};width:8px;height:8px"></span>`;
    html += `<span style="font-weight:500;color:#e2e8f0">${escapeHtml(card.title)}</span>`;
    html += `</div>`;
    html += `<div style="font-size:0.72rem;color:#64748b;margin-top:0.2rem">Status: <span style="color:${color}">${escapeHtml(card.status)}</span> &middot; Project: ${escapeHtml(projName)}</div>`;
    html += `</div>`;
  }
  return html;
}

function renderNfCard(item, colColor) {
  const isExpanded = nfExpandedId === item.id;
  const isDone = item.status === 'done';
  const doneClass = isDone ? 'nf-card-done' : '';
  const expandClass = isExpanded ? 'expanded' : '';

  let meta = [];
  if (item.due) meta.push('Due: ' + formatDate(item.due));
  if (item.remind) meta.push('Remind: ' + formatDateTime(item.remind));
  if (item.recurrence) meta.push(item.recurrence);

  const tags = (item.tags || []).map(t => `<span class="tag-pill">${escapeHtml(t)}</span>`).join('');
  const commentCount = (item.subnotes || []).length;
  const commentHint = commentCount > 0 ? `<span style="color:#64748b;font-size:0.72rem;margin-left:0.3rem">\uD83D\uDCAC ${commentCount}</span>` : '';
  const refCount = (item.references || []).length;
  const refHint = refCount > 0 ? `<span style="color:#64748b;font-size:0.72rem;margin-left:0.3rem" title="${refCount} reference${refCount !== 1 ? 's' : ''}">&#x1F310; ${refCount}</span>` : '';
  const bellHint = item.cron_installed ? `<span style="color:#f59e0b;font-size:0.72rem;margin-left:0.3rem" title="Cron reminder active">\uD83D\uDD14</span>` : '';

  let html = `<div class="nf-card ${doneClass} ${expandClass}"
    draggable="${isExpanded ? 'false' : 'true'}"
    data-id="${item.id}"
    onclick="nfToggleExpand('${item.id}')"
    ondragstart="nfDragStart(event, '${item.id}')"
    ondragend="nfDragEnd(event)">`;
  html += `<div><span class="nf-id">[${item.id}]</span><span class="nf-title">${escapeHtml(item.title)}</span>${tags}${commentHint}${refHint}${bellHint}</div>`;
  if (meta.length) html += `<div class="nf-meta">${meta.join(' &middot; ')}</div>`;
  const lc = item.linked_cards || [];
  if (lc.length) html += renderLinkedCardBadges(lc);

  if (isExpanded) {
    html += `<div class="card-detail" onclick="event.stopPropagation()">`;

    if (lc.length) html += renderLinkedCardsSection(lc);

    html += `<div class="section-label"${lc.length ? ' style="margin-top:0.6rem"' : ''}>Notes</div>`;
    html += item.body
      ? `<div class="notes-body">${escapeHtml(item.body)}</div>`
      : `<div class="notes-body" style="color:#64748b;font-style:italic">No notes yet</div>`;

    // References section
    const refs = item.references || [];
    if (refs.length) {
      html += `<div class="section-label" style="margin-top:0.6rem">References</div>`;
      for (const ref of refs) {
        const isUrl = ref.startsWith('http://') || ref.startsWith('https://');
        if (isUrl) {
          html += `<div style="font-size:0.8rem;margin-bottom:0.2rem"><a href="${escapeHtml(ref)}" target="_blank" rel="noopener" style="color:#60a5fa;text-decoration:none;word-break:break-all">&#x1F310; ${escapeHtml(ref)}</a></div>`;
        } else {
          html += `<div style="font-size:0.8rem;color:#94a3b8;margin-bottom:0.2rem">&#x1F4CE; ${escapeHtml(ref)}</div>`;
        }
      }
    }

    html += `<div class="section-label" style="margin-top:0.6rem">Comments</div>`;
    const comments = item.subnotes || [];
    if (!comments.length) {
      html += `<div style="color:#64748b;font-size:0.8rem;font-style:italic">No comments</div>`;
    } else {
      for (let i = 0; i < comments.length; i++) {
        const c = comments[i];
        html += `<div class="comment"><span class="comment-delete" onclick="nfDeleteComment('${item.id}', ${i})" title="Delete">\u2715</span>`;
        html += `<div class="comment-ts">${formatDateTime(c.ts)}</div><div class="comment-text">${escapeHtml(c.text)}</div></div>`;
      }
    }
    html += `<div style="margin-top:0.4rem"><div class="input-group input-group-sm">`;
    html += `<input type="text" class="form-control" style="background:#0f172a;border-color:#334155;color:#e2e8f0;font-size:0.8rem"
              id="nf-comment-${item.id}" placeholder="Add a comment..."
              onkeydown="if(event.key==='Enter')nfAddComment('${item.id}')">`;
    html += `<button class="btn btn-outline-secondary btn-sm" onclick="nfAddComment('${item.id}')">Post</button></div></div>`;

    html += `<div class="card-actions">`;
    html += isDone
      ? `<button class="btn btn-outline-success" onclick="nfReopenItem('${item.id}')">Reopen</button>`
      : `<button class="btn btn-outline-success" onclick="nfMarkDone('${item.id}')">Done</button>`;
    html += `<button class="btn btn-outline-info" onclick="nfOpenEdit('${item.id}')">Edit</button>`;
    if (item.cron_installed) {
      html += `<button class="btn btn-outline-warning" onclick="nfCancelReminder('${item.id}')">Cancel Reminder</button>`;
    }
    html += `<button class="btn btn-outline-danger" onclick="nfDeleteItem('${item.id}')">Delete</button>`;
    html += `</div></div>`;
  }
  html += `</div>`;
  return html;
}

function renderNoteFlow() {
  const boardEl = document.getElementById('nf-board');
  // Preserve column scroll positions across re-render
  const scrollPositions = {};
  boardEl.querySelectorAll('.column-body[data-col]').forEach(el => {
    scrollPositions[el.dataset.col] = el.scrollTop;
  });
  const active = nfItems.filter(i => i.status !== 'done');
  const done = nfItems.filter(i => i.status === 'done');
  const grouped = {};
  for (const item of active) {
    if (!grouped[item.type]) grouped[item.type] = [];
    grouped[item.type].push(item);
  }

  let html = '';
  for (const col of nfColumns) {
    const group = grouped[col.id] || [];
    html += `<div class="column" data-col="${col.id}" draggable="true"
      ondragstart="colDragStart(event,'nf','${col.id}')" ondragend="colDragEnd(event)"
      ondragover="colDragOver(event)" ondragleave="colDragLeave(event)"
      ondrop="colDrop(event,'nf','${col.id}')">`;
    html += `<div class="column-header" style="cursor:grab" ondblclick="nfRenameColumn('${col.id}')"><div class="column-title">`;
    html += `<span class="column-dot" style="background:${col.color}"></span>`;
    html += `<span>${col.icon} ${escapeHtml(col.label)}</span>`;
    html += `<span class="column-count">${group.length}</span></div>`;
    html += `<span style="cursor:pointer;color:#64748b;font-size:0.75rem" onclick="event.stopPropagation();nfDeleteColumn('${col.id}')" title="Delete column">\u2715</span>`;
    html += `</div>`;
    html += `<div class="column-body" data-col="${col.id}" ondragover="nfDragOver(event)" ondragleave="nfDragLeave(event)" ondrop="nfDrop(event, '${col.id}')">`;
    for (const item of group) html += renderNfCard(item, col.color);
    html += `</div>`;
    html += `<div class="column-footer"><div class="inline-add" id="nf-add-${col.id}">`;
    html += `<input type="text" id="nf-addInput-${col.id}" placeholder="Item title..."
      onkeydown="if(event.key==='Enter')nfQuickAdd('${col.id}'); if(event.key==='Escape')nfCloseInline('${col.id}')">`;
    html += `</div><button class="column-add-btn" id="nf-addBtn-${col.id}" onclick="nfOpenInline('${col.id}')">+ Add item</button></div>`;
    html += `</div>`;
  }
  html += `<div class="add-column-card" onclick="openAddColumnModal()">+ Add Column</div>`;
  boardEl.innerHTML = html;
  // Restore column scroll positions
  boardEl.querySelectorAll('.column-body[data-col]').forEach(el => {
    if (scrollPositions[el.dataset.col]) el.scrollTop = scrollPositions[el.dataset.col];
  });

  // Done strip
  const doneStrip = document.getElementById('doneStrip');
  if (done.length > 0) {
    doneStrip.style.display = '';
    document.getElementById('doneCount').textContent = done.length;
    const doneContainer = document.getElementById('doneItems');
    if (nfShowDone) {
      doneContainer.style.display = 'flex';
      document.getElementById('doneArrow').innerHTML = '&#9660;';
      let doneHtml = '';
      for (const item of done) {
        const col = nfColumns.find(c => c.id === item.type);
        const dotColor = col ? col.color : '#6b7280';
        if (nfExpandedId === item.id) {
          doneHtml += `<div class="done-expanded-card">${renderNfCard(item, dotColor)}</div>`;
        } else {
          doneHtml += `<div class="done-chip" onclick="nfToggleExpand('${item.id}')"
            draggable="true" data-id="${item.id}"
            ondragstart="nfDragStart(event, '${item.id}')" ondragend="nfDragEnd(event)">`;
          doneHtml += `<span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:${dotColor};margin-right:0.3rem"></span>`;
          doneHtml += `[${item.id}] ${escapeHtml(item.title)}</div>`;
        }
      }
      doneContainer.innerHTML = doneHtml;
    } else {
      doneContainer.style.display = 'none';
      document.getElementById('doneArrow').innerHTML = '&#9654;';
    }
  } else {
    doneStrip.style.display = 'none';
  }

  // Archive trigger
  const archiveTrigger = document.getElementById('archiveTrigger');
  if (archiveItems.length > 0) {
    archiveTrigger.style.display = '';
    document.getElementById('archiveCount').textContent = archiveItems.length;
  } else {
    archiveTrigger.style.display = 'none';
  }
}

// NoteFlow interactions
function nfToggleExpand(id) { nfExpandedId = nfExpandedId === id ? null : id; renderNoteFlow(); }
function toggleDone() { nfShowDone = !nfShowDone; renderNoteFlow(); }
function nfOpenInline(colId) {
  document.getElementById(`nf-add-${colId}`).classList.add('active');
  document.getElementById(`nf-addBtn-${colId}`).style.display = 'none';
  document.getElementById(`nf-addInput-${colId}`).focus();
}
function nfCloseInline(colId) {
  document.getElementById(`nf-add-${colId}`).classList.remove('active');
  document.getElementById(`nf-addBtn-${colId}`).style.display = '';
  document.getElementById(`nf-addInput-${colId}`).value = '';
}
async function nfQuickAdd(colId) {
  const input = document.getElementById(`nf-addInput-${colId}`);
  const title = input.value.trim();
  if (!title) return;
  await api('POST', '/api/items', { type: colId, title, body: '' });
  input.value = '';
  nfCloseInline(colId);
  await loadNoteFlow();
}
async function nfMarkDone(id) { await api('POST', `/api/items/${id}/done`); nfExpandedId = null; await loadNoteFlow(); }
async function nfReopenItem(id) { await api('POST', `/api/items/${id}/reopen`); await loadNoteFlow(); }
async function nfAddComment(id) {
  const input = document.getElementById(`nf-comment-${id}`);
  const text = input.value.trim();
  if (!text) return;
  await api('POST', `/api/items/${id}/subnotes`, { text });
  await loadNoteFlow();
}
async function nfDeleteComment(id, index) { await api('DELETE', `/api/items/${id}/subnotes/${index}`); await loadNoteFlow(); }
function nfOpenEdit(id) {
  const item = nfItems.find(i => i.id === id);
  if (!item) return;
  document.getElementById('editId').value = item.id;
  document.getElementById('editTitle').value = item.title;
  document.getElementById('editBody').value = item.body || '';
  document.getElementById('editTags').value = (item.tags || []).join(', ');
  if (item.due) {
    const d = new Date(item.due);
    document.getElementById('editDue').value = new Date(d.getTime() - d.getTimezoneOffset() * 60000).toISOString().slice(0, 16);
  } else { document.getElementById('editDue').value = ''; }
  new bootstrap.Modal(document.getElementById('editModal')).show();
}
async function saveEdit() {
  const id = document.getElementById('editId').value;
  const title = document.getElementById('editTitle').value.trim();
  const body = document.getElementById('editBody').value;
  const due = document.getElementById('editDue').value || null;
  const tagsRaw = document.getElementById('editTags').value;
  const tags = tagsRaw ? tagsRaw.split(',').map(t => t.trim()).filter(Boolean) : [];
  if (!title) return;
  await api('PUT', `/api/items/${id}`, { title, body, due, tags });
  bootstrap.Modal.getInstance(document.getElementById('editModal')).hide();
  await loadNoteFlow();
}
async function nfDeleteItem(id) {
  const item = nfItems.find(i => i.id === id);
  if (!item || !confirm(`Delete [${id}] ${item.title}?`)) return;
  await api('DELETE', `/api/items/${id}`);
  nfExpandedId = null;
  await loadNoteFlow();
}
async function nfCancelReminder(id) {
  await api('DELETE', `/api/items/${id}/cron`);
  await loadNoteFlow();
}

// NoteFlow drag & drop
function nfDragStart(e, id) {
  e.stopPropagation(); // prevent column drag
  nfDragItemId = id;
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', id);
  requestAnimationFrame(() => {
    const el = document.querySelector(`.nf-card[data-id="${id}"]`) || document.querySelector(`.done-chip[data-id="${id}"]`);
    if (el) el.classList.add('dragging');
  });
}
function nfDragEnd(e) {
  document.querySelectorAll('.dragging').forEach(el => el.classList.remove('dragging'));
  document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
  nfDragItemId = null;
}
function nfDragOver(e) { if (colDragId) return; e.preventDefault(); e.dataTransfer.dropEffect = 'move'; e.currentTarget.classList.add('drag-over'); }
function nfDragLeave(e) { e.currentTarget.classList.remove('drag-over'); }
async function nfDrop(e, colId) {
  if (colDragId) return; // column drag in progress, let it bubble
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');

}

let colDragType = null; // 'nf' or 'kb'
let colDragId = null;

function colDragStart(e, type, id) {
  // Only start column drag from the header (not from child cards)
  const header = e.currentTarget.querySelector('.column-header');
  if (header && !header.contains(e.target)) {
    e.preventDefault();
    return;
  }
  colDragType = type;
  colDragId = id;
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('application/col-drag', id);
  requestAnimationFrame(() => e.currentTarget.classList.add('col-dragging'));
}

function colDragEnd(e) {
  document.querySelectorAll('.col-dragging').forEach(el => el.classList.remove('col-dragging'));
  document.querySelectorAll('.col-drag-over').forEach(el => el.classList.remove('col-drag-over'));
  colDragType = null;
  colDragId = null;
}

function colDragOver(e) {
  if (!colDragId) return; // not a column drag
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  // Find the closest column
  const col = e.currentTarget.closest('.column');
  if (col) {
    document.querySelectorAll('.col-drag-over').forEach(el => el.classList.remove('col-drag-over'));
    col.classList.add('col-drag-over');
  }
}

function colDragLeave(e) {
  const col = e.currentTarget.closest('.column');
  if (col) col.classList.remove('col-drag-over');
}

async function colDrop(e, type, targetId) {
  e.preventDefault();
  e.stopPropagation();
  document.querySelectorAll('.col-drag-over').forEach(el => el.classList.remove('col-drag-over'));

  if (!colDragId || colDragType !== type || colDragId === targetId) return;

  if (type === 'nf') {
    // Reorder NoteFlow columns
    const order = nfColumns.map(c => c.id);
    const fromIdx = order.indexOf(colDragId);
    const toIdx = order.indexOf(targetId);
    if (fromIdx < 0 || toIdx < 0) return;
    order.splice(fromIdx, 1);
    order.splice(toIdx, 0, colDragId);
    await api('PUT', '/api/columns/reorder', { order });
    await loadNoteFlow();
  } else if (type === 'kb') {
    // Reorder Tasks statuses
    const order = (board.statuses || []).map(s => s.id || s);
    const fromIdx = order.indexOf(colDragId);
    const toIdx = order.indexOf(targetId);
    if (fromIdx < 0 || toIdx < 0) return;
    order.splice(fromIdx, 1);
    order.splice(toIdx, 0, colDragId);
    await api('PUT', '/api/board/statuses/reorder', { order });
    await loadBoard();
  }
}

function getProjectColor(projectId) {
  const proj = board.projects.find(p => p.id === projectId);
  return proj ? proj.color : '#64748b';
}

function getProjectName(projectId) {
  const proj = board.projects.find(p => p.id === projectId);
  return proj ? proj.name : projectId || 'Unassigned';
}

function getStatusColor(statusId) {
  const s = (board.statuses || []).find(s => (s.id || s) === statusId);
  if (s && s.color) return s.color;
  const fallback = { pending: '#f59e0b', active: '#3b82f6', done: '#10b981' };
  return fallback[statusId] || '#64748b';
}

function getStatusLabel(statusId) {
  const s = (board.statuses || []).find(s => (s.id || s) === statusId);
  if (s && s.label) return s.label;
  return statusId ? statusId.charAt(0).toUpperCase() + statusId.slice(1) : statusId;
}

function renderKbCard(card) {
  const isExpanded = false; // expansion via modal
  const commentCount = (card.comments || []).length;
  const commentHint = commentCount > 0 ? `<span class="kb-comment-count">\uD83D\uDCAC ${commentCount}</span>` : '';

  let badgeColor, badgeLabel;
  if (kbView === 'status') {
    badgeColor = getProjectColor(card.project);
    badgeLabel = getProjectName(card.project);
  } else {
    badgeColor = getStatusColor(card.status);
    badgeLabel = getStatusLabel(card.status);
  }

  let html = `<div class="kb-card" data-card-slug="${card.slug}" draggable="true"
    ondragstart="kbCardDragStart(event,'${card.slug}')" ondragend="kbCardDragEnd(event)"
    onclick="openCardDetail('${card.slug}')">`;
  html += `<div class="kb-title">${escapeHtml(card.title)}${commentHint}</div>`;
  if (card.description) {
    const shortDesc = card.description.length > 80 ? card.description.slice(0, 80) + '...' : card.description;
    html += `<div class="kb-desc">${escapeHtml(shortDesc)}</div>`;
  }
  html += `<div><span class="kb-badge" style="background:${badgeColor}22;color:${badgeColor};border:1px solid ${badgeColor}44">${escapeHtml(badgeLabel)}</span></div>`;
  html += `</div>`;
  return html;
}

function renderBoard() {
  const boardEl = document.getElementById('kb-board');
  // Preserve column scroll positions across re-render
  const scrollPositions = {};
  boardEl.querySelectorAll('.kb-column-body').forEach((el, i) => {
    scrollPositions[i] = el.scrollTop;
  });
  let html = '';

  if (kbView === 'status') {
    const statuses = board.statuses || [];
    for (const statusObj of statuses) {
      const sid = statusObj.id || statusObj;
      const label = statusObj.label || (sid.charAt(0).toUpperCase() + sid.slice(1));
      const color = statusObj.color || '#64748b';
      const cards = board.cards.filter(c => c.status === sid);
      const isBuiltin = BUILTIN_STATUSES.has(sid);

      html += `<div class="column" data-status="${sid}" draggable="true"
        ondragstart="colDragStart(event,'kb','${sid}')" ondragend="colDragEnd(event)"
        ondragover="colDragOver(event)" ondragleave="colDragLeave(event)"
        ondrop="colDrop(event,'kb','${sid}')">`;
      html += `<div class="column-header" style="cursor:grab" ondblclick="kbRenameStatus('${sid}')"><div class="column-title">`;
      html += `<span class="column-dot" style="background:${color}"></span>`;
      html += `<span>${escapeHtml(label)}</span>`;
      html += `<span class="column-count">${cards.length}</span>`;
      html += `</div>`;
      html += `<span class="status-delete-btn" onclick="event.stopPropagation();kbDeleteStatus('${sid}')" title="Delete status">\u2715</span>`;
      html += `</div>`;
      html += `<div class="column-body kb-column-body"
        ondragover="kbColDragOver(event)" ondragleave="kbColDragLeave(event)"
        ondrop="kbColDrop(event,'status','${sid}')">`;
      for (const card of cards) html += renderKbCard(card);
      html += `</div></div>`;
    }
    html += `<div class="add-column-card" onclick="openAddStatusModal()">+ Add Status</div>`;
  } else {
    // By project
    for (const proj of board.projects) {
      const cards = board.cards.filter(c => c.project === proj.id);
      if (!cards.length) continue; // skip empty projects
      html += `<div class="column">`;
      html += `<div class="column-header"><div class="column-title">`;
      html += `<span class="column-dot" style="background:${proj.color}"></span>`;
      html += `<span>${escapeHtml(proj.name)}</span>`;
      html += `<span class="column-count">${cards.length}</span>`;
      html += `</div></div>`;
      html += `<div class="column-body kb-column-body"
        ondragover="kbColDragOver(event)" ondragleave="kbColDragLeave(event)"
        ondrop="kbColDrop(event,'project','${proj.id}')">`;
      for (const card of cards) html += renderKbCard(card);
      html += `</div></div>`;
    }
    // Unassigned cards
    const unassigned = board.cards.filter(c => !c.project || !board.projects.find(p => p.id === c.project));
    if (unassigned.length) {
      html += `<div class="column"><div class="column-header"><div class="column-title">`;
      html += `<span class="column-dot" style="background:#64748b"></span><span>Unassigned</span>`;
      html += `<span class="column-count">${unassigned.length}</span></div></div>`;
      html += `<div class="column-body kb-column-body"
        ondragover="kbColDragOver(event)" ondragleave="kbColDragLeave(event)"
        ondrop="kbColDrop(event,'project','')">`;
      for (const card of unassigned) html += renderKbCard(card);
      html += `</div></div>`;
    }
  }

  boardEl.innerHTML = html;
  // Restore column scroll positions
  boardEl.querySelectorAll('.kb-column-body').forEach((el, i) => {
    if (scrollPositions[i]) el.scrollTop = scrollPositions[i];
  });
}

  kbView = view;
  document.querySelectorAll('.view-btn').forEach(b => b.classList.toggle('active', b.textContent.toLowerCase().includes(view)));

let _activeComboCleanup = null;

function openProjectCombo(id) {
  filterProjectCombo(id);
  const dd = document.getElementById(id + '-dropdown');
  dd.classList.add('open');
  // Close on outside click
  if (_activeComboCleanup) _activeComboCleanup();
  const handler = (e) => {
    const wrap = document.getElementById(id + '-wrap');
    if (wrap && !wrap.contains(e.target)) {
      dd.classList.remove('open');
      document.removeEventListener('mousedown', handler);
      _activeComboCleanup = null;
    }
  };
  setTimeout(() => document.addEventListener('mousedown', handler), 0);
  _activeComboCleanup = () => { document.removeEventListener('mousedown', handler); _activeComboCleanup = null; };
}

function filterProjectCombo(id) {
  const input = document.getElementById(id);
  const dd = document.getElementById(id + '-dropdown');
  const query = input.value.trim().toLowerCase();

  let html = '';
  html += `<div class="combo-option" onmousedown="selectProjectCombo('${id}', '', '')">
    <span style="color:#64748b;font-style:italic">None</span></div>`;

  const matches = board.projects.filter(p => !query || p.name.toLowerCase().includes(query));
  for (const p of matches) {
    html += `<div class="combo-option" onmousedown="selectProjectCombo('${id}', '${p.id}', '${escapeHtml(p.name)}')">
      <span class="combo-dot" style="background:${p.color}"></span>${escapeHtml(p.name)}</div>`;
  }

  // If typed text doesn't exactly match any project, show "Create" option
  const exactMatch = board.projects.find(p => p.name.toLowerCase() === query);
  if (query && !exactMatch) {
    html += `<div class="combo-option combo-new" onmousedown="selectProjectCombo('${id}', '__new__', '${escapeHtml(input.value.trim())}')">
      + Create &ldquo;${escapeHtml(input.value.trim())}&rdquo;</div>`;
  }

  dd.innerHTML = html;
}

function projectComboKeydown(e, id) {
  if (e.key === 'Escape') {
    document.getElementById(id + '-dropdown').classList.remove('open');
    document.getElementById(id).blur();
  } else if (e.key === 'Enter') {
    e.preventDefault();
    const input = document.getElementById(id);
    const query = input.value.trim().toLowerCase();
    const match = board.projects.find(p => p.name.toLowerCase() === query);
    if (match) {
      selectProjectCombo(id, match.id, match.name);
    } else if (query) {
      selectProjectCombo(id, '__new__', input.value.trim());
    } else {
      selectProjectCombo(id, '', '');
    }
  }
}

function selectProjectCombo(id, projectId, projectName) {
  const input = document.getElementById(id);
  const dd = document.getElementById(id + '-dropdown');
  input.value = projectName;
  dd.classList.remove('open');
  // Fire the registered callback
  const event = new CustomEvent('projectSelected', { detail: { projectId, projectName } });
  input.dispatchEvent(event);
}

async function ensureProject(projectId, projectName) {
  // If projectId is '__new__', create the project and return the real ID.
  // Otherwise return projectId as-is (or null for empty).
  if (projectId === '__new__') {
    const newId = makeProjectSlug(projectName);
    // Check if slug already exists (edge case)
    const existing = board.projects.find(p => p.id === newId);
    if (existing) return newId;
    await api('POST', '/api/board/projects', { id: newId, name: projectName });
    await loadBoard();
    return newId;
  }
  return projectId || null;
}

// Card detail modal

  let html = `<div class="modal-header border-secondary">`;
  html += `<h5 class="modal-title">${escapeHtml(card.title)}</h5>`;
  html += `<button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button></div>`;
  html += `<div class="modal-body">`;

  html += `<div style="display:flex;gap:0.5rem;margin-bottom:0.8rem">`;
  html += `<span class="kb-badge" style="background:${projColor}22;color:${projColor};border:1px solid ${projColor}44">${escapeHtml(projName)}</span>`;
  html += `<span class="kb-badge" style="background:${statusColor}22;color:${statusColor};border:1px solid ${statusColor}44">${card.status}</span>`;

  if (!comments.length) {
    html += `<div style="color:#64748b;font-size:0.8rem;font-style:italic">No comments</div>`;
  } else {
    for (const c of comments) {
      html += `<div class="comment">`;

      html += `<div class="comment-text">${escapeHtml(c.text)}</div></div>`;
