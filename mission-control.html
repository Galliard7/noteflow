function relativeTime(iso) {
  if (!iso) return '';
  const now = Date.now();
  const then = new Date(iso).getTime();
  const diffSec = Math.floor((now - then) / 1000);
  if (diffSec < 60) return 'just now';
  const diffMin = Math.floor(diffSec / 60);
  if (diffMin < 60) return `${diffMin}m ago`;
  const diffHr = Math.floor(diffMin / 60);
  if (diffHr < 24) return `${diffHr}h ago`;
  const diffDay = Math.floor(diffHr / 24);
  return `${diffDay}d ago`;
}

function renderActivity() {
  const list = document.getElementById('activityList');

  // Active cards from board state
  const activeCards = (board.cards || []).filter(c => c.status === 'active');
  // Manual activity entries
  const manualEntries = board.activity || [];

  if (!activeCards.length && !manualEntries.length) {
    list.innerHTML = '<div class="activity-empty">No active work</div>';
    return;
  }

  const now = Date.now();
  const STALE_MS = 30 * 60 * 1000;

  // Project color lookup
  const projMap = {};
  (board.projects || []).forEach(p => { projMap[p.id] = p; });

  let html = '';

  // Active cards section
  if (activeCards.length) {
    html += `<div style="font-size:0.72rem;color:#64748b;text-transform:uppercase;letter-spacing:0.5px;padding:0.3rem 0.2rem 0.4rem;font-weight:600">Active Tasks (${activeCards.length})</div>`;
    for (const card of activeCards) {
      const proj = card.project ? projMap[card.project] : null;
      const color = proj ? proj.color : '#3b82f6';
      const projLabel = proj ? proj.name : '';
      const updated = relativeTime(card.updated);

      html += `<div class="activity-entry" style="cursor:pointer" onclick="openCardFromActivity('${escapeHtml(card.slug)}')">`;
      html += `<div class="activity-entry-header">`;
      html += `<span class="activity-dot" style="background:#10b981"></span>`;
      if (projLabel) {
        html += `<span class="activity-label" style="background:${color}22;color:${color}">${escapeHtml(projLabel)}</span>`;
      }
      html += `<span class="activity-ts">${updated}</span>`;
      html += `</div>`;
      html += `<div class="activity-text">${escapeHtml(card.title)}</div>`;
      if (card.comments && card.comments.length) {
        const last = card.comments[card.comments.length - 1];
        html += `<div style="font-size:0.72rem;color:#64748b;margin-top:0.2rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${escapeHtml(last.text)}">&#x1F4AC; ${escapeHtml(last.text)}</div>`;
      }
      html += `</div>`;
    }
  }

  // Manual session entries
  if (manualEntries.length) {
    html += `<div style="font-size:0.72rem;color:#64748b;text-transform:uppercase;letter-spacing:0.5px;padding:0.5rem 0.2rem 0.4rem;font-weight:600;border-top:1px solid #334155;margin-top:0.3rem">Sessions</div>`;
    for (const entry of manualEntries) {
      const age = now - new Date(entry.ts).getTime();
      const isStale = age > STALE_MS;
      const dotColor = isStale ? '#64748b' : '#10b981';
      const staleClass = isStale ? 'stale' : '';

      html += `<div class="activity-entry ${staleClass}">`;
      html += `<span class="activity-clear" onclick="clearActivityEntry('${entry.id}')" title="Remove">\u2715</span>`;
      html += `<div class="activity-entry-header">`;
      html += `<span class="activity-dot" style="background:${dotColor}"></span>`;
      html += `<span class="activity-label" style="background:${entry.color || '#3b82f6'}22;color:${entry.color || '#3b82f6'}">${escapeHtml(entry.label || 'CC')}</span>`;
      html += `<span class="activity-ts">${relativeTime(entry.ts)}</span>`;
      html += `</div>`;
      html += `<div class="activity-text" title="${escapeHtml(entry.text)}">${escapeHtml(entry.text)}</div>`;
      html += `</div>`;
    }
  }

  list.innerHTML = html;
}

function openCardFromActivity(slug) {
  // Switch to Tasks tab and expand that card
  if (currentTab !== 'tasks') switchTab('tasks');
  kbExpandedSlug = slug;
  renderBoard();
  // Scroll card into view
  setTimeout(() => {
    const el = document.querySelector(`[data-card-slug="${slug}"]`);
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }, 100);
}

async function loadActivity() {
  // Board data is already loaded by loadBoard(), just re-render
  renderActivity();
}

async function clearActivityEntry(activityId) {
  await api('DELETE', `/api/board/activity/${activityId}`);
  // Refresh board to get updated activity
  const res = await api('GET', '/api/board');
  if (!res.error) board = res;
  renderActivity();
}

// ══════════════════════════════════════════════
//  PROJECTS TAB
// ══════════════════════════════════════════════

let projectsData = [];
let selectedProjectId = null;

async function loadProjects() {
  const res = await api('GET', '/api/board');
  if (res.error) return;
  board = res;
  projectsData = res.projects || [];
  if (selectedProjectId) renderProjectDetail();
  else renderProjectsGrid();
}

function getPhaseProgress(phases) {
  if (!phases || !phases.length) return { done: 0, total: 0, pct: 0 };
  const done = phases.filter(p => p.status === 'done').length;
  return { done, total: phases.length, pct: Math.round((done / phases.length) * 100) };
}

function getCurrentPhase(phases) {
  if (!phases || !phases.length) return null;
  const active = phases.find(p => p.status === 'active');
  if (active) return { label: active.name, type: 'active' };
  const nextPending = phases.find(p => p.status === 'pending');
  if (nextPending) {
    const allDone = phases.every(p => p.status === 'done');
    if (allDone) return { label: 'All phases complete', type: 'done' };
    return { label: nextPending.name, type: 'next' };
  }
  return { label: 'All phases complete', type: 'done' };
}

function getRelatedTasks(projectId) {
  return (board.cards || []).filter(c => c.project === projectId);
}

function renderProjectsGrid() {
  const grid = document.getElementById('projects-grid');
  if (!projectsData.length) {
    grid.innerHTML = '<div style="color:#64748b;padding:2rem;text-align:center;font-style:italic">No projects found</div>';
    return;
  }

  grid.innerHTML = projectsData.map(proj => {
    const { done, total, pct } = getPhaseProgress(proj.phases);
    const current = getCurrentPhase(proj.phases);
    const tasks = getRelatedTasks(proj.id);
    const hasPhases = proj.phases && proj.phases.length > 0;

    let phaseHtml = '';
    if (hasPhases) {
      let phaseInfo = '';
      if (current) {
        if (current.type === 'active') phaseInfo = `<strong>Active:</strong> ${escapeHtml(current.label)}`;
        else if (current.type === 'next') phaseInfo = `<strong>Next:</strong> ${escapeHtml(current.label)}`;
        else phaseInfo = `<strong>${escapeHtml(current.label)}</strong>`;
      }
      phaseHtml = `
        <div class="project-progress-label">
          <span>${pct}%</span><span>${done}/${total} phases</span>
        </div>
        <div class="project-progress-bar">
          <div class="project-progress-fill" style="width:${pct}%;background:${proj.color || '#6366f1'}"></div>
        </div>
        ${phaseInfo ? `<div class="project-phase-info">${phaseInfo}</div>` : ''}
      `;
    }

    return `
      <div class="project-card" data-project="${proj.id}" draggable="true"
        ondragstart="pcDragStart(event,'${proj.id}')" ondragend="pcDragEnd(event)"
        ondragover="pcDragOver(event)" ondragleave="pcDragLeave(event)"
        ondrop="pcDrop(event,'${proj.id}')"
        onclick="if(!pcDidDrag)openProjectDetail('${proj.id}')">
        <div class="project-card-header">
          <span class="project-card-dot" style="background:${proj.color || '#6366f1'}"></span>
          <span class="project-card-name">${escapeHtml(proj.name)}</span>
        </div>
        ${proj.summary ? `<div class="project-card-summary">${escapeHtml(proj.summary)}</div>` : ''}
        ${phaseHtml}
        ${tasks.length ? `<div class="project-tasks-count">${tasks.length} related task${tasks.length !== 1 ? 's' : ''}</div>` : ''}
      </div>
    `;
  }).join('');
}

function openProjectDetail(projectId) {
  selectedProjectId = projectId;
  document.getElementById('projects-portfolio').style.display = 'none';
  document.getElementById('project-detail').style.display = 'block';
  renderProjectDetail();
}

function closeProjectDetail() {
  selectedProjectId = null;
  document.getElementById('project-detail').style.display = 'none';
  document.getElementById('projects-portfolio').style.display = 'block';
  renderProjectsGrid();
}

function renderProjectDetail() {
  const proj = projectsData.find(p => p.id === selectedProjectId);
  if (!proj) { closeProjectDetail(); return; }

  const container = document.getElementById('project-detail');
  const { done, total, pct } = getPhaseProgress(proj.phases);
  const tasks = getRelatedTasks(proj.id);
  const hasPhases = proj.phases && proj.phases.length > 0;

  // Status color map
  const statusColors = {};
  (board.statuses || []).forEach(s => { statusColors[s.id] = s.color; });

  let phasesHtml = '';
  if (hasPhases) {
    const phaseItems = proj.phases.map(ph => {
      let icon, nameClass;
      if (ph.status === 'done') { icon = '&#x2705;'; nameClass = 'done'; }
      else if (ph.status === 'active') { icon = '&#x1F535;'; nameClass = 'active'; }
      else { icon = '&#x26AA;'; nameClass = ''; }
      return `
        <div class="phase-item">
          <span class="phase-icon">${icon}</span>
          <div class="phase-content">
            <div class="phase-name ${nameClass}">${escapeHtml(ph.name)}</div>
            ${ph.description ? `<div class="phase-desc">${escapeHtml(ph.description)}</div>` : ''}
          </div>
        </div>
      `;
    }).join('');

    phasesHtml = `
      <div class="project-section-title">Phases</div>
      <div class="project-progress-label" style="margin-bottom:0.3rem">
        <span>${pct}%</span><span>${done}/${total} phases</span>
      </div>
      <div class="project-progress-bar" style="margin-bottom:0.8rem">
        <div class="project-progress-fill" style="width:${pct}%;background:${proj.color || '#6366f1'}"></div>
      </div>
      ${phaseItems}
    `;
  }

  let tasksHtml = '';
  if (tasks.length) {
    const taskItems = tasks.map(card => {
      const color = statusColors[card.status] || '#64748b';
      return `
        <div class="related-task-item">
          <span class="related-task-status" style="background:${color}20;color:${color}">${escapeHtml(card.status)}</span>
          <span style="color:#e2e8f0">${escapeHtml(card.title)}</span>
        </div>
      `;
    }).join('');
    tasksHtml = `
      <div class="project-section-title">Related Tasks</div>
      ${taskItems}
    `;
  }

  let linksHtml = '';
  const links = proj.links || [];
  if (proj.spec) links.length || links.push({ label: 'Spec', path: proj.spec });
  if (proj.code) {
    const hasCode = links.some(l => l.label === 'Code');
    if (!hasCode) links.push({ label: 'Code', path: proj.code });
  }
  if (links.length) {
    const linkItems = links.map(lnk => `
      <div class="file-link-item" onclick="openFileViewer('${escapeHtml(lnk.path)}')" style="cursor:pointer;border-radius:6px;padding:0.5rem 0.6rem;transition:background 0.1s" onmouseover="this.style.background='rgba(255,255,255,0.05)'" onmouseout="this.style.background=''">
        <span class="file-link-icon">${lnk.label === 'Code' ? '&#x1F4C2;' : '&#x1F4C4;'}</span>
        <span class="file-link-label">${escapeHtml(lnk.label)}</span>
        <span class="file-link-path">${escapeHtml(lnk.path)}</span>
      </div>
    `).join('');
    linksHtml = `
      <div class="project-section-title">Files</div>
      ${linkItems}
    `;
  }

  container.innerHTML = `
    <button class="project-detail-back" onclick="closeProjectDetail()">&larr; Back to Projects</button>
    <div class="project-detail-header">
      <span class="project-card-dot" style="background:${proj.color || '#6366f1'}"></span>
      <span class="project-detail-name">${escapeHtml(proj.name)}</span>
    </div>
    ${proj.summary ? `<div class="project-detail-summary">${escapeHtml(proj.summary)}</div>` : ''}
    ${phasesHtml}
    ${tasksHtml}
    ${linksHtml}
  `;
}

// ══════════════════════════════════════════════
//  FILE VIEWER
// ══════════════════════════════════════════════

let fileViewerHistory = []; // stack of paths for breadcrumb

function isMarkdown(name) {
  return /\.(md|markdown|mdx)$/i.test(name);
}

async function openFileViewer(path) {
  fileViewerHistory = [path];
  await loadFileContent(path);
  document.getElementById('fileViewerOverlay').style.display = 'flex';
}

function closeFileViewer() {
  document.getElementById('fileViewerOverlay').style.display = 'none';
  fileViewerHistory = [];
}

async function navigateFile(path) {
  // If path is already in history, pop back to it
  const idx = fileViewerHistory.indexOf(path);
  if (idx >= 0) {
    fileViewerHistory = fileViewerHistory.slice(0, idx + 1);
  } else {
    fileViewerHistory.push(path);
  }
  await loadFileContent(path);
}

function renderBreadcrumb(currentPath) {
  const bc = document.getElementById('fileViewerBreadcrumb');
  // Build crumbs from history
  const crumbs = fileViewerHistory.map((p, i) => {
    const name = p.split('/').filter(Boolean).pop() || p;
    const isCurrent = i === fileViewerHistory.length - 1;
    if (isCurrent) {
      return `<span class="file-viewer-crumb current">${escapeHtml(name)}</span>`;
    }
    return `<span class="file-viewer-crumb" onclick="navigateFile('${escapeHtml(p)}')">${escapeHtml(name)}</span>`;
  });
  bc.innerHTML = crumbs.join('<span> / </span>');
}

async function loadFileContent(path) {
  const body = document.getElementById('fileViewerBody');
  body.innerHTML = '<div style="color:#64748b;padding:2rem;text-align:center">Loading...</div>';
  renderBreadcrumb(path);

  try {
    const res = await fetch(`/api/files?path=${encodeURIComponent(path)}`);
    const data = await res.json();

    if (data.error) {
      body.innerHTML = `<div style="color:#ef4444;padding:1rem">${escapeHtml(data.error)}</div>`;
      return;
    }

    if (data.type === 'directory') {
      renderDirectoryListing(data, path);
    } else {
      renderFileContent(data);
    }
  } catch (e) {
    body.innerHTML = `<div style="color:#ef4444;padding:1rem">Failed to load: ${escapeHtml(e.message)}</div>`;
  }
}

function renderDirectoryListing(data, basePath) {
  const body = document.getElementById('fileViewerBody');
  if (!data.entries || !data.entries.length) {
    body.innerHTML = '<div style="color:#64748b;padding:1rem;font-style:italic">Empty directory</div>';
    return;
  }

  // Sort: directories first, then files
  const sorted = [...data.entries].sort((a, b) => {
    if (a.type !== b.type) return a.type === 'directory' ? -1 : 1;
    return a.name.localeCompare(b.name);
  });

  const cleanBase = basePath.replace(/\/+$/, '');
  body.innerHTML = sorted.map(entry => {
    const entryPath = `${cleanBase}/${entry.name}`;
    const icon = entry.type === 'directory' ? '&#x1F4C1;' : getFileIcon(entry.name);
    const nameClass = entry.type === 'directory' ? 'dir' : '';
    return `
      <div class="dir-entry" onclick="navigateFile('${escapeHtml(entryPath)}')">
        <span class="dir-entry-icon">${icon}</span>
        <span class="dir-entry-name ${nameClass}">${escapeHtml(entry.name)}</span>
      </div>
    `;
  }).join('');
}

function getFileIcon(name) {
  if (isMarkdown(name)) return '&#x1F4DD;';
  if (/\.(py)$/i.test(name)) return '&#x1F40D;';
  if (/\.(js|ts|jsx|tsx)$/i.test(name)) return '&#x1F4DC;';
  if (/\.(json|yaml|yml|toml)$/i.test(name)) return '&#x2699;';
  if (/\.(html|css)$/i.test(name)) return '&#x1F310;';
  if (/\.(sh|bash|zsh)$/i.test(name)) return '&#x1F4BB;';
  return '&#x1F4C4;';
}

function renderFileContent(data) {
  const body = document.getElementById('fileViewerBody');
  if (isMarkdown(data.name)) {
    body.innerHTML = `<div class="file-viewer-md">${marked.parse(data.content)}</div>`;
  } else {
    body.innerHTML = `<div class="file-viewer-plain">${escapeHtml(data.content)}</div>`;
  }
}

// ══════════════════════════════════════════════
//  ARCHIVE DRAWER
// ══════════════════════════════════════════════

function openArchiveDrawer() {
  document.getElementById('archiveOverlay').classList.add('open');
  setTimeout(() => document.getElementById('archiveDrawer').classList.add('open'), 10);
  renderArchive();
}

function closeArchiveDrawer() {
  document.getElementById('archiveDrawer').classList.remove('open');
  setTimeout(() => document.getElementById('archiveOverlay').classList.remove('open'), 350);
  archiveExpandedId = null;
}

function renderArchiveCard(item) {
  const isExpanded = archiveExpandedId === item.id;
  const col = nfColumns.find(c => c.id === item.type);
  const dotColor = col ? col.color : '#6b7280';
  const expandClass = isExpanded ? 'expanded' : '';

  let html = `<div class="archive-card ${expandClass}" onclick="archiveToggleExpand('${item.id}')">`;
  html += `<div><span class="nf-id">[${item.id}]</span><span class="nf-title" style="text-decoration:line-through;color:#6b7280">${escapeHtml(item.title)}</span></div>`;
  if (item.linked_card) html += renderLinkedCardBadge(item.linked_card);

  if (isExpanded) {
    html += `<div class="card-detail" onclick="event.stopPropagation()">`;

    if (item.linked_card) html += renderLinkedCardSection(item.linked_card);

    html += `<div class="section-label"${item.linked_card ? ' style="margin-top:0.6rem"' : ''}>Notes</div>`;
    html += item.body
      ? `<div class="notes-body">${escapeHtml(item.body)}</div>`
      : `<div class="notes-body" style="color:#64748b;font-style:italic">No notes</div>`;

    html += `<div class="section-label" style="margin-top:0.6rem">Comments</div>`;
    const comments = item.subnotes || [];
    if (!comments.length) {
      html += `<div style="color:#64748b;font-size:0.8rem;font-style:italic">No comments</div>`;
    } else {
      for (const c of comments) {
        html += `<div class="comment"><div class="comment-ts">${formatDateTime(c.ts)}</div><div class="comment-text">${escapeHtml(c.text)}</div></div>`;
      }
    }

    // History
    const history = item.history || [];
    if (history.length) {
      html += `<div class="section-label" style="margin-top:0.6rem">History</div>`;
      for (const h of history) {
        html += `<div style="font-size:0.75rem;color:#64748b;margin-bottom:0.15rem">${formatDateTime(h.ts)} — ${escapeHtml(h.action)}</div>`;
      }
    }

    if (item.archived_at) {
      html += `<div style="font-size:0.72rem;color:#475569;margin-top:0.4rem;font-style:italic">Archived: ${formatDateTime(item.archived_at)}</div>`;
    }

    html += `</div>`;
  }
  html += `</div>`;
  return html;
}

function renderArchive() {
  const body = document.getElementById('archiveBody');
  if (!archiveItems.length) {
    body.innerHTML = '<div style="color:#64748b;text-align:center;padding:2rem;font-style:italic">No archived items</div>';
    return;
  }

  // Group by month, most recent first
  const grouped = {};
  for (const item of archiveItems) {
    const ts = item.archived_at || item.created;
    const d = new Date(ts);
    const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    const label = d.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
    if (!grouped[key]) grouped[key] = { label, items: [] };
    grouped[key].items.push(item);
  }

  const sortedKeys = Object.keys(grouped).sort().reverse();
  let html = '';
  for (const key of sortedKeys) {
    const group = grouped[key];
    html += `<div class="archive-month-header">${escapeHtml(group.label)}</div>`;
    for (const item of group.items) {
      html += renderArchiveCard(item);
    }
  }
  body.innerHTML = html;
}

function archiveToggleExpand(id) {
  archiveExpandedId = archiveExpandedId === id ? null : id;
  renderArchive();
}

// Close file viewer / archive drawer on Escape
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    if (document.getElementById('archiveDrawer').classList.contains('open')) {
      closeArchiveDrawer();
    } else if (document.getElementById('fileViewerOverlay').style.display !== 'none') {
      closeFileViewer();
    }
  }
});

loadNoteFlow();
setInterval(() => {
  if (currentTab === 'noteflow') loadNoteFlow();
  else if (currentTab === 'tasks') loadBoard();
  else if (currentTab === 'projects') loadProjects();
}, 3000);
